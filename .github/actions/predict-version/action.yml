# Project:   HyperI CI
# File:      .github/actions/predict-version/action.yml
# Purpose:   Composite action — detect publish trigger + predict next version
#
# License:   BUSL-1.1 — HYPERI PTY LIMITED
# Copyright: (c) 2026 HYPERI PTY LIMITED
#
# Used by every language-specific workflow's `setup` job. Encapsulates
# the universal "is this a publish run, and what version?" decision so
# the rust/go/python/ts workflows don't duplicate ~80 lines of identical
# bash + npm install.
#
# The matrix-generation step that follows is language-specific (target
# triples for Rust/Go, single-arch for Python/TS) and stays in the
# calling workflow.

name: Predict version
description: Detect Publish trigger + run semantic-release dry-run for next version

inputs:
  github-token:
    description: GitHub token (for semantic-release dry-run)
    required: true
  from-head:
    description: "'true' on a from-head dispatch (issue #35): resolve version for tagging HEAD"
    required: false
    default: ""
  bump:
    description: "Version resolution for from-head: auto (semantic-release picks) | patch | minor (forced)"
    required: false
    default: "auto"

outputs:
  will-publish:
    description: "'true' iff this run should tag + publish"
    value: ${{ steps.gate.outputs.will-publish }}
  version:
    description: "Predicted next version (without 'v' prefix); set on push and on from-head dispatch"
    value: ${{ steps.predict.outputs.version || steps.forced.outputs.version }}
  run-checks:
    description: "'true' iff quality + test should run (publish-worthy commit OR pull_request)"
    value: ${{ steps.derive.outputs.run-checks }}
  run-build:
    description: "'true' iff build + container + publish should run (publish-worthy only)"
    value: ${{ steps.derive.outputs.run-build }}

runs:
  using: composite
  steps:
    - name: Detect publish trigger
      # Gate the entire publish flow on one signal: `will-publish`.
      #
      # - workflow_dispatch with a tag input → always publish (retroactive).
      # - push to main with `Publish: true` trailer in HEAD commit → publish.
      # - everything else → validate-only (no version stamp, no tag, no
      #   container push, no registry uploads).
      id: gate
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "will-publish=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Triggered by workflow_dispatch — publish run"
          exit 0
        fi

        # Publish only ever happens from main (branch-mode decision 1:
        # branches validate, main is the sole publish path). Stated HERE,
        # at the gate SSOT, rather than relying on downstream job `if:`
        # conditions to catch a trailer on a branch. A trailer on a
        # non-main ref is ignored LOUDLY, never silently.
        if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
          echo "will-publish=false" >> "$GITHUB_OUTPUT"
          msg=$(git log -1 --format=%B HEAD)
          if printf '%s' "$msg" | grep -qiE '^[[:space:]]*Publish:[[:space:]]*true[[:space:]]*$'; then
            echo "::warning::'Publish: true' trailer on non-main ref '${{ github.ref }}' — ignored. Publishing only happens from main; merge first."
          fi
          echo "Non-main ref — validate-only run (no tag, no publish)"
          exit 0
        fi

        # push to main — match Publish: true trailer (case-insensitive on key)
        msg=$(git log -1 --format=%B HEAD)
        if printf '%s' "$msg" | grep -qiE '^[[:space:]]*Publish:[[:space:]]*true[[:space:]]*$'; then
          echo "will-publish=true" >> "$GITHUB_OUTPUT"
          echo "::notice::'Publish: true' trailer detected — this is a publish run"
        else
          echo "will-publish=false" >> "$GITHUB_OUTPUT"
          echo "No 'Publish: true' trailer — validate-only run (no tag, no publish)"
        fi

    - name: Setup semantic-release (shared toolchain — single source of truth)
      # Runs on push, and on a from-head `auto` dispatch (issue #35) so the
      # version is resolved in plan (the build then stamps the correct value).
      # Forced bumps use the inline semver step below and skip semantic-release.
      if: ${{ steps.gate.outputs.will-publish == 'true' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.from-head == 'true' && inputs.bump == 'auto')) }}
      uses: hyperi-io/hyperi-ci/.github/actions/setup-semantic-release@main

    - name: Predict next version
      # Run semantic-release in --dry-run to determine the version that
      # the tag-and-publish job will eventually create. The build job
      # in the calling workflow stamps Cargo.toml + VERSION to this
      # value BEFORE compiling, so CARGO_PKG_VERSION (used in
      # AppMetrics, --version flags, log output) matches the published
      # tag.
      #
      # Hard fail if `Publish: true` was set but no release-worthy
      # commits exist — silent skip violates "nothing should say it
      # worked if it didn't."
      #
      # We capture the dry-run exit code separately so a real crash
      # (npm install failure, network, etc.) is distinguished from
      # "ran successfully but no version to release."
      id: predict
      if: ${{ steps.gate.outputs.will-publish == 'true' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.from-head == 'true' && inputs.bump == 'auto')) }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set +e
        dry_output=$(npx semantic-release --dry-run 2>&1)
        dry_rc=$?
        set -e
        echo "$dry_output"

        if [[ $dry_rc -ne 0 ]]; then
          echo "::error::semantic-release --dry-run exited $dry_rc — see log above"
          exit $dry_rc
        fi

        version=$(printf '%s\n' "$dry_output" | grep -oE 'next release version is [0-9]+\.[0-9]+\.[0-9]+' | head -1 | awk '{print $5}')

        if [[ -z "$version" ]]; then
          echo "::error::No release-worthy commits since last tag. On a push, drop the 'Publish: true' trailer (this is a non-release commit) or land a fix:/feat:/perf: commit. On a from-head dispatch, re-run with --bump patch (or minor) to force a release."
          exit 1
        fi

        # Orphaned-tag guard (issue #37): semantic-release only considers
        # tags REACHABLE from HEAD ('No git tag version found on branch
        # main'). If v* tags exist in refs but NONE are reachable, a past
        # history rewrite orphaned them — semantic-release re-predicts a
        # taken or regressed version. Fail at plan time (the _release-tail
        # off-HEAD guard stays as defence-in-depth) instead of after a
        # full build. Tags are local: the plan checkout is fetch-depth: 0.
        tags_all=$(git tag --list 'v[0-9]*')
        tags_reachable=$(git tag --list 'v[0-9]*' --merged HEAD)
        if [[ -n "$tags_all" && -z "$tags_reachable" ]]; then
          echo "::error::v* tags exist but none are reachable from HEAD — orphaned by a past history rewrite (issue #37). semantic-release is blind to them and predicted v${version}, which would collide or regress. Recover the tags with scripts/recover-tags.py, or ship past them with 'hyperi-ci publish --version X.Y.Z'."
          exit 1
        fi

        # First release on a genuinely tag-less repo (issue #37 follow-up):
        # semantic-release defaults to 1.0.0 ('There is no previous
        # release'). A committed VERSION file declares the starting version
        # and is shipped VERBATIM — the tag-on-publish twin of 'VERSION is
        # the source of truth'. No VERSION file keeps the 1.0.0 default.
        # (The forced --bump paths bump FROM VERSION instead — a bump is a
        # bump; see push._compute_next_version.)
        if [[ -z "$tags_all" && -f VERSION ]]; then
          start=$(head -1 VERSION | tr -d '[:space:]' | sed 's/^v//')
          if printf '%s' "$start" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' && [[ "$start" != "$version" ]]; then
            echo "::notice::First release on a tag-less repo — VERSION declares starting version $start (semantic-release default was $version)"
            version="$start"
          fi
        fi

        # Early collision guard: the predicted NEXT version must not
        # already exist as a tag off-HEAD (existing at HEAD = idempotent
        # re-run, allowed). Plan-time twin of the _release-tail guard.
        if git rev-parse -q --verify "refs/tags/v${version}^{commit}" >/dev/null 2>&1; then
          existing=$(git rev-parse "refs/tags/v${version}^{commit}")
          head_sha=$(git rev-parse "HEAD^{commit}")
          if [[ "$existing" != "$head_sha" ]]; then
            echo "::error::Predicted v${version} already exists at ${existing} (HEAD is ${head_sha}) — refusing to re-release it (issue #37). Ship past it with 'hyperi-ci publish --version X.Y.Z' (or --bump patch), or recover orphaned tags with scripts/recover-tags.py."
            exit 1
          fi
        fi

        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "::notice::Predicted next version: v$version"

    - name: Predict next version (forced bump / explicit version)
      # from-head dispatch with a non-auto bump (issue #35). The `bump`
      # channel carries either a bump level (patch|minor — release HEAD even
      # with no release-worthy commit, computed as `last v* tag + bump`) or an
      # explicit X.Y.Z (the `hyperi-ci publish --version` override, used
      # verbatim to step past a taken/orphaned tag — the issue #37 case). Runs
      # for any non-auto, non-empty bump so plan + build stamp the same value
      # tag-head later creates in Tag & Publish. Trivial glue: semver math +
      # a regex; the same computation lives in push.tag_head for the real tag.
      id: forced
      if: ${{ steps.gate.outputs.will-publish == 'true' && github.event_name == 'workflow_dispatch' && inputs.from-head == 'true' && inputs.bump != 'auto' && inputs.bump != '' }}
      shell: bash
      run: |
        set -euo pipefail
        bump='${{ inputs.bump }}'

        # Explicit version override: use it verbatim, no last-tag math.
        if printf '%s' "$bump" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "version=$bump" >> "$GITHUB_OUTPUT"
          echo "::notice::Explicit from-head version: v$bump"
          exit 0
        fi

        latest=$(git tag --list 'v*' --sort=-v:refname | head -1 | sed 's/^v//')
        if [[ -z "$latest" ]] && [[ -f VERSION ]]; then
          latest=$(sed 's/^v//' VERSION | head -1)
        fi
        if [[ -z "$latest" ]]; then
          echo "::error::No v* tag and no VERSION file — cannot compute forced bump."
          exit 1
        fi
        IFS='.' read -r maj min pat <<< "$latest"
        case "$bump" in
          patch) pat=$((pat + 1)) ;;
          minor) min=$((min + 1)); pat=0 ;;
          *) echo "::error::Invalid bump '$bump' — expected patch, minor, or X.Y.Z"; exit 1 ;;
        esac
        version="${maj}.${min}.${pat}"
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "::notice::Forced from-head bump ($bump): v$version (was v$latest)"

    - name: Derive gate outputs
      # Single source of truth for the run-checks / run-build conditions.
      # Language workflows read these outputs and never re-implement the
      # boolean logic. If you find yourself writing `will-publish == 'true'
      # || event_name == 'pull_request'` anywhere else, you've drifted.
      id: derive
      shell: bash
      run: |
        set -euo pipefail
        will_publish='${{ steps.gate.outputs.will-publish }}'
        event_name='${{ github.event_name }}'

        if [[ "$will_publish" == "true" ]]; then
          run_build=true
        else
          run_build=false
        fi

        if [[ "$will_publish" == "true" || "$event_name" == "pull_request" ]]; then
          run_checks=true
        else
          run_checks=false
        fi

        echo "run-build=$run_build" >> "$GITHUB_OUTPUT"
        echo "run-checks=$run_checks" >> "$GITHUB_OUTPUT"
        echo "::notice::run-checks=$run_checks run-build=$run_build (will-publish=$will_publish event=$event_name)"
