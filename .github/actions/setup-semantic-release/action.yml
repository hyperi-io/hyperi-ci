# Project:   HyperI CI
# File:      .github/actions/setup-semantic-release/action.yml
# Purpose:   Install the pinned semantic-release toolchain — ONE source of truth
#
# License:   Proprietary — HYPERI PTY LIMITED
# Copyright: (c) 2026 HYPERI PTY LIMITED
#
# Consumed by predict-version (dry-run), _release-tail (real tag), ci.yml.
# Predict and the real run must install identical plugins, else they compute
# different versions ("tag vX already exists"). One place for that list — here.
#
# Release config is central too: if a repo has no .releaserc, this composite
# drops the canonical tagger-only `default.releaserc.json` into the workspace
# (ephemeral, never committed). Most repos carry NO .releaserc; one is
# committed only for a genuine exception, and this step then defers to it.
# semantic-release is a TAGGER only — version stamping is `hyperi-ci
# stamp-version`, publishing is hyperi-ci's publish stage. git plugin stays in
# the install list for back-compat; the default config does not use it.

name: Setup semantic-release
description: Install the pinned, shared semantic-release toolchain (single source of truth)

inputs:
  node-version:
    description: Node.js version for the semantic-release runtime
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install semantic-release + plugins (pinned)
      shell: bash
      run: |
        npm install -g \
          semantic-release@25 \
          @semantic-release/commit-analyzer \
          @semantic-release/release-notes-generator \
          @semantic-release/changelog \
          @semantic-release/exec \
          @semantic-release/git \
          conventional-changelog-conventionalcommits

    - name: Provide default release config if the repo has none
      shell: bash
      run: |
        if compgen -G "$GITHUB_WORKSPACE/.releaserc*" > /dev/null
        then
          echo "Repo has its own .releaserc — deferring to it"
        else
          cp "$GITHUB_ACTION_PATH/default.releaserc.json" "$GITHUB_WORKSPACE/.releaserc.json"
          echo "No .releaserc — provided the canonical tagger-only default"
        fi
