# Project:   HyperI CI
# File:      .github/actions/setup-runtime/action.yml
# Purpose:   Install the hyperi-ci runtime — uv + Python + native deps
#
# License:   BUSL-1.1 — HYPERI PTY LIMITED
# Copyright: (c) 2026 HYPERI PTY LIMITED
#
# The hyperi-ci CLI is Python, so EVERY job (any language) needs uv + Python
# + the project's native build deps before it can run `hyperi-ci ...`. That
# trio was copy-pasted into every quality/test/build job of all four language
# workflows — collapsed here. Language-specific toolchains (rustup, setup-go,
# setup-node) stay in the SME's workflow, AFTER this step.
#
# Referenced from reusable workflows as
#   hyperi-io/hyperi-ci/.github/actions/setup-runtime@main
# (a local ./ ref would resolve to the CONSUMER repo, which lacks it).

name: Setup hyperi-ci runtime
description: Install uv + Python + the project's native build dependencies

inputs:
  language:
    description: Project language for native deps (rust | python | typescript | go)
    required: true
  python-version:
    description: Python version for the hyperi-ci CLI runtime
    required: false
    default: "3.12"
  enable-uv-cache:
    description: setup-uv cache — true for Python (deps dominate), false for Rust (cargo cache dominates)
    required: false
    default: "false"
  hyperci-install:
    description: How to invoke the hyperi-ci CLI
    required: false
    default: "uvx --no-cache --refresh hyperi-ci"

runs:
  using: composite
  steps:
    - name: Install uv
      if: ${{ !contains(runner.name, 'arc-runner') }}
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: ${{ inputs.enable-uv-cache }}

    - name: Set up Python
      shell: bash
      run: |
        command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
        command -v python3 || uv python install ${{ inputs.python-version }}

    - name: Install native dependencies
      shell: bash
      run: ${{ inputs.hyperci-install }} install-native-deps ${{ inputs.language }}
