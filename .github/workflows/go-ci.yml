# File:      .github/workflows/go-ci.yml
# Purpose:   Reusable Go CI workflow for consumer projects
#
# License:   Proprietary — HYPERI PTY LIMITED
# Copyright: (c) 2026 HYPERI PTY LIMITED
#
# Go-specific stages: quality, test, setup, build (with version stamp).
# Container + tag-and-publish are delegated to the shared
# _release-tail.yml workflow. Setup uses the shared predict-version
# composite action.

name: Go CI

on:
  workflow_call:
    inputs:
      runner-mode:
        type: string
        default: ""
        description: "Runner mode: 'free' forces ubuntu-latest, empty uses GH_RUNNER_* vars"
      publish-target:
        type: string
        default: "oss"
        description: "Publish destination: oss (default, FOSS), internal (deprecated, JFrog), or both"
      go-version-file:
        type: string
        default: "go.mod"
        description: "File to read Go version from"
      runner-quality:
        type: string
        default: ""
      runner-test:
        type: string
        default: ""
      runner-build:
        type: string
        default: ""
      test-matrix:
        type: string
        default: ""
        description: "JSON array of runner OS for test matrix"
      tag:
        type: string
        default: ""
        description: "Tag to publish (workflow_dispatch only)"
    secrets:
      JFROG_TOKEN:
        required: false
      GITLEAKS_GH_ACTIONS_KEY:
        required: false
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      CONTAINER_MGT_APP_PRIVATE_KEY:
        required: false

  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true
        description: "Tag to publish (e.g. v1.3.0)"
      runner-mode:
        type: string
        default: ""
      publish-target:
        type: string
        default: "oss"

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

env:
  HYPERCI_PUBLISH_TARGET: ${{ inputs.publish-target }}
  HYPERCI_INSTALL: uvx --no-cache --refresh hyperi-ci

jobs:
  quality:
    name: Quality
    runs-on: ${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-quality || vars.GH_RUNNER_GOLANG || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Go
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Install Go quality tools
        # No `|| true` — quality stage runs these and silent absence
        # would mask supply-chain risks.
        run: |
          command -v golangci-lint || go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          command -v gosec || go install github.com/securego/gosec/v2/cmd/gosec@latest
          command -v govulncheck || go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps golang

      - name: Run quality checks
        env:
          GITLEAKS_GH_ACTIONS_KEY: ${{ secrets.GITLEAKS_GH_ACTIONS_KEY }}
        run: ${{ env.HYPERCI_INSTALL }} run quality

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ fromJson(startsWith(github.head_ref || github.ref_name, 'renovate/') && format('["{0}"]', vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && '["ubuntu-latest"]' || inputs.test-matrix || format('["{0}"]', inputs.runner-test || vars.GH_RUNNER_GOLANG || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest')) }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Go
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps golang

      - name: Run tests
        run: ${{ env.HYPERCI_INSTALL }} run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-golang-${{ matrix.os }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  setup:
    name: Setup
    needs: [quality, test]
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.matrix.outputs.matrix }}
      will-publish: ${{ steps.predict.outputs.will-publish }}
      next-version: ${{ steps.predict.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Predict version (gate + dry-run)
        id: predict
        uses: hyperi-io/hyperi-ci/.github/actions/predict-version@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build matrix
        # Go cross-compiles natively (GOOS/GOARCH) — same multi-arch
        # matrix shape as Rust on publish; single-arch on validate.
        id: matrix
        run: |
          AMD64_RUNNER="${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-build || vars.GH_RUNNER_GOLANG || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}"
          ARM64_RUNNER="${{ vars.GH_RUNNER_ARM64 || 'ubuntu-24.04-arm' }}"
          if [[ "${{ steps.predict.outputs.will-publish }}" == "true" ]]; then
            echo "matrix={\"include\":[{\"goos\":\"linux\",\"goarch\":\"amd64\",\"runner\":\"${AMD64_RUNNER}\",\"os_arch\":\"linux-amd64\"},{\"goos\":\"linux\",\"goarch\":\"arm64\",\"runner\":\"${ARM64_RUNNER}\",\"os_arch\":\"linux-arm64\"}]}" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"include\":[{\"goos\":\"linux\",\"goarch\":\"amd64\",\"runner\":\"${AMD64_RUNNER}\",\"os_arch\":\"linux-amd64\"}]}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.os_arch }})
    needs: [setup]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.build-matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Stamp predicted version
        # Version-first pipeline: write the version we're about to tag
        # into VERSION before `go build`. Go binaries pick this up via
        # `-ldflags "-X main.version=$VERSION"` in build.py.
        if: needs.setup.outputs.will-publish == 'true' && github.event_name == 'push'
        run: |
          version="${{ needs.setup.outputs.next-version }}"
          if [[ -z "$version" ]]; then
            echo "::error::next-version output empty"
            exit 1
          fi
          echo "Stamping version: $version"
          if [[ -f VERSION ]]; then
            echo "$version" > VERSION
            echo "Stamped VERSION"
          fi

      - name: Set up Go
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps golang

      - name: Run build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: ${{ env.HYPERCI_INSTALL }} run build

      - name: Generate deployment artefacts
        # Skipped silently for projects without a deployment contract.
        run: ${{ env.HYPERCI_INSTALL }} run generate

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-dist-${{ matrix.os_arch }}
          path: |
            dist/
            ci-tmp/
          if-no-files-found: ignore
          retention-days: 1

  release-tail:
    name: Release tail
    needs: [setup, build]
    uses: hyperi-io/hyperi-ci/.github/workflows/_release-tail.yml@main
    with:
      language: golang
      will-publish: ${{ needs.setup.outputs.will-publish }}
      tag: ${{ inputs.tag }}
      publish-target: ${{ inputs.publish-target }}
    secrets: inherit
