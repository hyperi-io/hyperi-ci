# Project:   HyperI CI
# File:      .github/workflows/go-ci.yml
# Purpose:   Reusable Go CI workflow for consumer projects
# Status:    BETA — functional but not battle-tested to the same degree
#            as the Rust, Python, and TypeScript workflows. Maintained,
#            not yet proven at the same scale.
#
# License:   BUSL-1.1 — HYPERI PTY LIMITED
# Copyright: (c) 2026 HYPERI PTY LIMITED
#
# Go-specific stages: quality, test, setup, build (with version stamp).
# Container + tag-and-publish are delegated to the shared
# _release-tail.yml workflow. Setup uses the shared predict-version
# composite action.

name: Go CI

on:
  workflow_call:
    inputs:
      runner-mode:
        type: string
        default: ""
        description: "Runner mode: 'free' forces ubuntu-latest, empty uses GH_RUNNER_* vars"
      publish-target:
        type: string
        default: "oss"
        description: "Publish destination (legacy field, ignored — every publish goes to OSS registries)"
      go-version-file:
        type: string
        default: "go.mod"
        description: "File to read Go version from"
      runner-quality:
        type: string
        default: ""
      runner-test:
        type: string
        default: ""
      runner-build:
        type: string
        default: ""
      test-matrix:
        type: string
        default: ""
        description: "JSON array of runner OS for test matrix"
      tag:
        type: string
        default: ""
        description: "Tag to publish (workflow_dispatch only)"
      from-head:
        type: string
        default: ""
        description: "'true' on a from-head dispatch (issue #35): release/retry HEAD — the CI creates the tag."
      bump:
        type: string
        default: "auto"
        description: "Version resolution for from-head: auto | patch | minor (forced) | X.Y.Z (exact version)."
      submodules:
        type: string
        default: ""
        description: "Space-separated submodule paths to init after checkout (e.g. 'schemas'). Empty (default) inits nothing. The submodule must be reachable by the job token -- public, or a token with cross-repo read access."
    secrets:
      JFROG_TOKEN:
        required: false
      GITLEAKS_GH_ACTIONS_KEY:
        required: false
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      CONTAINER_MGT_APP_PRIVATE_KEY:
        required: false

  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: false
        default: ""
        description: "Tag to re-publish (existing tag). Omit + set from-head to release HEAD."
      from-head:
        type: string
        required: false
        default: ""
        description: "'true' to release/retry the current HEAD — the CI creates the tag (issue #35). Mutually exclusive with `tag`."
      bump:
        type: string
        required: false
        default: "auto"
        description: "Version resolution for from-head: auto | patch | minor (forced) | X.Y.Z (exact version)."
      runner-mode:
        type: string
        default: ""
      publish-target:
        type: string
        default: "oss"

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

env:
  HYPERCI_PUBLISH_TARGET: ${{ inputs.publish-target }}
  HYPERCI_INSTALL: uvx --no-cache --refresh hyperi-ci
  # Rare edge-case escape hatch: set the HYPERCI_QUALITY_SKIP repo/org
  # variable (e.g. "semgrep") to force-skip a quality tool whose false
  # positive is halting CI, until the real fix lands. Empty when unset.
  HYPERCI_QUALITY_SKIP: ${{ vars.HYPERCI_QUALITY_SKIP }}

# Least-privilege GITHUB_TOKEN default for every job (CodeQL
# actions/missing-workflow-permissions). Only release-tail elevates -- it
# passes write down to _release-tail.yml (semantic-release commit/tag + GHCR).
# plan / commit-check / quality / test / build are read-only.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # plan — runs FIRST. Computes gate outputs; downstream jobs read them.
  # See docs/ARCHITECTURE.md.
  # ---------------------------------------------------------------------------
  plan:
    name: Plan
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    outputs:
      run-checks: ${{ steps.predict.outputs.run-checks }}
      run-build: ${{ steps.predict.outputs.run-build }}
      will-publish: ${{ steps.predict.outputs.will-publish }}
      next-version: ${{ steps.predict.outputs.version }}
      build-matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Beta notice
        run: echo "::warning title=Go CI is beta::The Go reusable workflow is less battle-tested than Rust/Python/TS — verify results carefully."

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Predict version + derive gates
        id: predict
        uses: hyperi-io/hyperi-ci/.github/actions/predict-version@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          from-head: ${{ inputs.from-head }}
          bump: ${{ inputs.bump }}

      - name: Generate build matrix
        # Go cross-compiles natively (GOOS/GOARCH) — same multi-arch
        # matrix shape as Rust on publish; single-arch on validate.
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          AMD64_RUNNER="${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-build || vars.GH_RUNNER_GOLANG || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}"
          ARM64_RUNNER="${{ vars.GH_RUNNER_ARM64 || 'ubuntu-24.04-arm' }}"
          if [[ "${{ steps.predict.outputs.run-build }}" == "true" ]]; then
            matrix='{"include":[{"goos":"linux","goarch":"amd64","runner":"'"$AMD64_RUNNER"'","os_arch":"linux-amd64"},{"goos":"linux","goarch":"arm64","runner":"'"$ARM64_RUNNER"'","os_arch":"linux-arm64"}]}'
          else
            matrix='{"include":[{"goos":"linux","goarch":"amd64","runner":"'"$AMD64_RUNNER"'","os_arch":"linux-amd64"}]}'
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  commit-check:
    name: Commit messages
    # Landing gate for conventional-commit messages. Deliberately NOT gated
    # on plan.outputs.run-checks: a cheap git-log + regex check must validate
    # what actually reaches main on EVERY merge, not only publish-worthy
    # pushes (all the quality job covers). Fatal on push to main (what lands);
    # advisory on pull_request (branch commits may be squashed away -- see
    # commit_validation.run). Feature-branch pushes skip it, so the fast
    # chore-skip path is untouched. See CLAUDE.md CI gate doctrine.
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
      - name: Validate commit messages
        run: ${{ env.HYPERCI_INSTALL }} check-commits

  quality:
    name: Quality
    needs: [plan]
    if: needs.plan.outputs.run-checks == 'true'
    runs-on: ${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-quality || vars.GH_RUNNER_GOLANG || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Go
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Install Go quality tools
        # No `|| true` — quality stage runs these and silent absence
        # would mask supply-chain risks.
        run: |
          command -v golangci-lint || go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          command -v gosec || go install github.com/securego/gosec/v2/cmd/gosec@latest
          command -v govulncheck || go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps golang

      - name: Deepen history for secret scan
        # gitleaks scans the branch git log for committed secrets; a depth-1
        # checkout would only see HEAD. Deepen so the scan covers the pushed
        # range. Conventional-commit validation moved to the commit-check job
        # (its own fetch-depth: 0 checkout). Harmless on an already-full clone.
        if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
        run: git fetch --deepen=200 origin

      - name: Run quality checks
        env:
          GITLEAKS_GH_ACTIONS_KEY: ${{ secrets.GITLEAKS_GH_ACTIONS_KEY }}
        run: ${{ env.HYPERCI_INSTALL }} run quality

  test:
    name: Test
    needs: [plan]
    if: needs.plan.outputs.run-checks == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ fromJson(startsWith(github.head_ref || github.ref_name, 'renovate/') && format('["{0}"]', vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && '["ubuntu-latest"]' || inputs.test-matrix || format('["{0}"]', inputs.runner-test || vars.GH_RUNNER_GOLANG || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest')) }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Go
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps golang

      - name: Init submodules
        if: ${{ inputs.submodules != '' }}
        env:
          SUBMODULES: ${{ inputs.submodules }}
        run: git submodule update --init --depth 1 $SUBMODULES

      - name: Run tests
        run: ${{ env.HYPERCI_INSTALL }} run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-golang-${{ matrix.os }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build (${{ matrix.os_arch }})
    needs: [plan, quality, test]
    if: needs.plan.outputs.run-build == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJson(needs.plan.outputs.build-matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Stamp predicted version
        # Version-first pipeline: write the version we're about to tag
        # into VERSION before `go build`. Go binaries pick this up via
        # `-ldflags "-X main.version=$VERSION"` in build.py. Runs on push
        # AND on a from-head dispatch (issue #35) — both release HEAD,
        # whose committed tree is stale (tagger-only). A plain `tag`
        # dispatch is skipped (the tag's tree is correct).
        if: needs.plan.outputs.will-publish == 'true' && (github.event_name == 'push' || inputs.from-head == 'true')
        run: |
          version="${{ needs.plan.outputs.next-version }}"
          if [[ -z "$version" ]]; then
            echo "::error::next-version output empty"
            exit 1
          fi
          echo "Stamping version: $version"
          if [[ -f VERSION ]]; then
            echo "$version" > VERSION
            echo "Stamped VERSION"
          fi

      - name: Set up Go
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps golang

      - name: Run build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: ${{ env.HYPERCI_INSTALL }} run build

      - name: Generate deployment artefacts
        # Skipped silently for projects without a deployment contract.
        run: ${{ env.HYPERCI_INSTALL }} run generate

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-dist-${{ matrix.os_arch }}
          path: |
            dist/
            ci-tmp/
          if-no-files-found: ignore
          retention-days: 1

  release-tail:
    name: Release tail
    needs: [plan, build]
    # Elevated + passed to _release-tail.yml: its tag-and-publish job commits +
    # tags (contents), pushes GHCR (packages) and runs the semantic-release GH
    # plugin (issues + pull-requests). Capped by the caller's grant.
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
    uses: hyperi-io/hyperi-ci/.github/workflows/_release-tail.yml@main
    with:
      language: golang
      will-publish: ${{ needs.plan.outputs.will-publish }}
      next-version: ${{ needs.plan.outputs.next-version }}
      tag: ${{ inputs.tag }}
      from-head: ${{ inputs.from-head }}
      bump: ${{ inputs.bump }}
      publish-target: ${{ inputs.publish-target }}
      submodules: ${{ inputs.submodules }}
    secrets: inherit
