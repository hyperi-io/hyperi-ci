name: Rust CI

on:
  workflow_call:
    inputs:
      runner-mode:
        type: string
        default: ""
        description: "Runner mode: 'free' forces ubuntu-latest, empty uses GH_RUNNER_* vars"
      publish-target:
        type: string
        default: "internal"
        description: "Publish destination: internal, oss, or both"
      rust-toolchain:
        type: string
        default: "stable"
        description: "Rust toolchain version"
      runner-quality:
        type: string
        default: ""
        description: "Runner for quality job (default: ubuntu-latest)"
      runner-test:
        type: string
        default: ""
        description: "Runner for test job (default: ubuntu-latest)"
      runner-build:
        type: string
        default: ""
        description: "Runner for build job (default: ubuntu-latest)"
      test-matrix:
        type: string
        default: ""
        description: "JSON array of runner OS for test matrix (overrides runner-test)"
      tag:
        type: string
        default: ""
        description: "Tag to publish (workflow_dispatch only)"
    secrets:
      JFROG_TOKEN:
        required: false
      CARGO_REGISTRY_TOKEN:
        required: false
      GITLEAKS_GH_ACTIONS_KEY:
        required: false
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      CONTAINER_MGT_APP_PRIVATE_KEY:
        required: false

  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true
        description: "Tag to publish (e.g. v1.3.0)"
      runner-mode:
        type: string
        default: ""
        description: "Runner mode override"
      publish-target:
        type: string
        default: "internal"
        description: "Publish destination: internal, oss, or both"
      rust-toolchain:
        type: string
        default: "stable"
        description: "Rust toolchain version"

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

env:
  HYPERCI_PUBLISH_TARGET: ${{ inputs.publish-target }}
  HYPERCI_INSTALL: uvx --no-cache --refresh hyperi-ci

jobs:
  quality:
    name: Quality
    # Renovate branches use lightweight runners — dependency update PRs don't need 16cpu
    runs-on: ${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-quality || vars.GH_RUNNER_RUST || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps rust

      - name: Install Rust toolchain
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          components: clippy, rustfmt

      - name: Cache cargo
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo tools
        run: |
          command -v cargo-audit || cargo install --locked cargo-audit || true
          command -v cargo-deny || cargo install --locked cargo-deny || true

      - name: Run quality checks
        env:
          GITLEAKS_GH_ACTIONS_KEY: ${{ secrets.GITLEAKS_GH_ACTIONS_KEY }}
        run: ${{ env.HYPERCI_INSTALL }} run quality

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Renovate branches use lightweight runners — dependency update PRs don't need 16cpu
        os: ${{ fromJson(startsWith(github.head_ref || github.ref_name, 'renovate/') && format('["{0}"]', vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && '["ubuntu-latest"]' || inputs.test-matrix || format('["{0}"]', inputs.runner-test || vars.GH_RUNNER_RUST || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest')) }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps rust

      - name: Install Rust toolchain
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Cache cargo
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: ${{ env.HYPERCI_INSTALL }} run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-rust-${{ matrix.os }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  setup:
    name: Setup
    needs: [quality, test]
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: matrix
        run: |
          # Renovate branches use lightweight runners — dependency update PRs don't need 16cpu
          AMD64_RUNNER="${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-build || vars.GH_RUNNER_RUST || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}"
          ARM64_RUNNER="${{ vars.GH_RUNNER_ARM64 || 'ubuntu-24.04-arm' }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "matrix={\"include\":[{\"target\":\"x86_64-unknown-linux-gnu\",\"runner\":\"${AMD64_RUNNER}\",\"os_arch\":\"linux-amd64\"},{\"target\":\"aarch64-unknown-linux-gnu\",\"runner\":\"${ARM64_RUNNER}\",\"os_arch\":\"linux-arm64\"}]}" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"include\":[{\"target\":\"x86_64-unknown-linux-gnu\",\"runner\":\"${AMD64_RUNNER}\",\"os_arch\":\"linux-amd64\"}]}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.os_arch }})
    needs: [setup]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.build-matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps rust

      - name: Install Rust toolchain
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Cache cargo
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run build
        env:
          RUST_BUILD_TARGETS: ${{ matrix.target }}
        run: ${{ env.HYPERCI_INSTALL }} run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-dist-${{ matrix.os_arch }}
          path: dist/
          if-no-files-found: ignore
          retention-days: 1

  container:
    name: Container
    needs: [build]
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Check container enabled
        id: check
        run: |
          if [ -f .hyperi-ci.yaml ]; then
            enabled=$(python3 -c "import yaml; c=yaml.safe_load(open('.hyperi-ci.yaml')); print(c.get('container',{}).get('enabled','false'))" 2>/dev/null || echo "false")
          else
            enabled="false"
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        if: steps.check.outputs.enabled == 'True' || steps.check.outputs.enabled == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: build-dist-*
          path: dist/
          merge-multiple: true

      - name: Docker Hub login
        if: (steps.check.outputs.enabled == 'True' || steps.check.outputs.enabled == 'true') && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate container mgt token
        if: (steps.check.outputs.enabled == 'True' || steps.check.outputs.enabled == 'true') && vars.CONTAINER_MGT_APP_ID != ''
        id: container-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CONTAINER_MGT_APP_ID }}
          private-key: ${{ secrets.CONTAINER_MGT_APP_PRIVATE_KEY }}
          owner: hyperi-io

      - name: GHCR login
        if: steps.check.outputs.enabled == 'True' || steps.check.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ steps.container-token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.enabled == 'True' || steps.check.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Install uv
        if: steps.check.outputs.enabled == 'True' || steps.check.outputs.enabled == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        if: steps.check.outputs.enabled == 'True' || steps.check.outputs.enabled == 'true'
        run: uv python install 3.12

      - name: Build and push container
        if: steps.check.outputs.enabled == 'True' || steps.check.outputs.enabled == 'true'
        env:
          HYPERCI_PUBLISH_TARGET: ${{ inputs.publish-target }}
        run: ${{ env.HYPERCI_INSTALL }} run container

  release:
    name: Release
    needs: [quality, test, build, container]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install semantic-release
        run: >-
          npm install -g
          semantic-release@25
          @semantic-release/commit-analyzer
          @semantic-release/release-notes-generator
          @semantic-release/changelog
          @semantic-release/exec
          @semantic-release/git
          conventional-changelog-conventionalcommits

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  publish:
    name: Publish
    needs: [build, container]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Check for VERSION
        id: check
        run: |
          if [ -f VERSION ]; then
            echo "has_version=true" >> "$GITHUB_OUTPUT"
            echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          else
            echo "has_version=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker Hub login
        if: steps.check.outputs.has_version == 'true' && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate container mgt token
        if: steps.check.outputs.has_version == 'true' && vars.CONTAINER_MGT_APP_ID != ''
        id: container-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CONTAINER_MGT_APP_ID }}
          private-key: ${{ secrets.CONTAINER_MGT_APP_PRIVATE_KEY }}
          owner: hyperi-io

      - name: GHCR login
        if: steps.check.outputs.has_version == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ steps.container-token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Download build artifacts
        if: steps.check.outputs.has_version == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: build-dist-*
          path: dist/
          merge-multiple: true

      - name: Install Rust toolchain
        if: steps.check.outputs.has_version == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Install uv
        if: steps.check.outputs.has_version == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        if: steps.check.outputs.has_version == 'true'
        run: uv python install 3.12

      - name: Publish
        if: steps.check.outputs.has_version == 'true'
        env:
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: ${{ env.HYPERCI_INSTALL }} run publish
