name: Rust CI

on:
  workflow_call:
    inputs:
      runner-mode:
        type: string
        default: ""
        description: "Runner mode: 'free' forces ubuntu-latest, empty uses GH_RUNNER_* vars"
      publish-target:
        type: string
        default: "internal"
        description: "Publish destination: internal, oss, or both"
      rust-toolchain:
        type: string
        default: "stable"
        description: "Rust toolchain version"
      runner-quality:
        type: string
        default: ""
        description: "Runner for quality job (default: ubuntu-latest)"
      runner-test:
        type: string
        default: ""
        description: "Runner for test job (default: ubuntu-latest)"
      runner-build:
        type: string
        default: ""
        description: "Runner for build job (default: ubuntu-latest)"
      test-matrix:
        type: string
        default: ""
        description: "JSON array of runner OS for test matrix (overrides runner-test)"
    secrets:
      JFROG_TOKEN:
        required: false
      CARGO_REGISTRY_TOKEN:
        required: false
      GITLEAKS_GH_ACTIONS_KEY:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HYPERCI_PUBLISH_TARGET: ${{ inputs.publish-target }}
  HYPERCI_INSTALL: uvx --refresh hyperi-ci

jobs:
  quality:
    name: Quality
    runs-on: ${{ (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-quality || vars.GH_RUNNER_RUST || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps rust

      - name: Install Rust toolchain
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          components: clippy, rustfmt

      - name: Cache cargo
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo tools
        run: |
          command -v cargo-audit || cargo install --locked cargo-audit || true
          command -v cargo-deny || cargo install --locked cargo-deny || true

      - name: Run quality checks
        env:
          GITLEAKS_GH_ACTIONS_KEY: ${{ secrets.GITLEAKS_GH_ACTIONS_KEY }}
        run: ${{ env.HYPERCI_INSTALL }} run quality

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ fromJson((inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && '["ubuntu-latest"]' || inputs.test-matrix || format('["{0}"]', inputs.runner-test || vars.GH_RUNNER_RUST || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest')) }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps rust

      - name: Install Rust toolchain
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Cache cargo
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: ${{ env.HYPERCI_INSTALL }} run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-rust-${{ matrix.os }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build
    needs: [quality, test]
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ${{ (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-build || vars.GH_RUNNER_RUST || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps rust

      - name: Install cross-compilation toolchain
        if: runner.os == 'Linux'
        run: |
          if ! command -v aarch64-linux-gnu-gcc >/dev/null 2>&1; then
            sudo dpkg --add-architecture arm64
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
              libc6-dev-arm64-cross
          fi

      - name: Install Rust toolchain
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Cache cargo
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run build
        run: ${{ env.HYPERCI_INSTALL }} run build

  release:
    name: Release
    needs: [quality, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install semantic-release
        run: >-
          npm install -g
          semantic-release@25
          @semantic-release/commit-analyzer
          @semantic-release/release-notes-generator
          @semantic-release/changelog
          @semantic-release/exec
          @semantic-release/git
          @semantic-release/github
          conventional-changelog-conventionalcommits

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  publish:
    name: Publish
    needs: [release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Check for VERSION
        id: check
        run: |
          if [ -f VERSION ]; then
            echo "has_version=true" >> "$GITHUB_OUTPUT"
            echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          else
            echo "has_version=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        if: steps.check.outputs.has_version == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Install uv
        if: steps.check.outputs.has_version == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        if: steps.check.outputs.has_version == 'true'
        run: uv python install 3.12

      - name: Publish
        if: steps.check.outputs.has_version == 'true'
        env:
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: ${{ env.HYPERCI_INSTALL }} run publish
