name: Rust CI

on:
  workflow_call:
    inputs:
      runner-mode:
        type: string
        default: ""
        description: "Runner mode: 'free' forces ubuntu-latest, empty uses GH_RUNNER_* vars"
      publish-target:
        type: string
        default: "internal"
        description: "Publish destination: internal, oss, or both"
      rust-toolchain:
        type: string
        default: "stable"
        description: "Rust toolchain version"
      runner-quality:
        type: string
        default: ""
        description: "Runner for quality job (default: ubuntu-latest)"
      runner-test:
        type: string
        default: ""
        description: "Runner for test job (default: ubuntu-latest)"
      runner-build:
        type: string
        default: ""
        description: "Runner for build job (default: ubuntu-latest)"
      test-matrix:
        type: string
        default: ""
        description: "JSON array of runner OS for test matrix (overrides runner-test)"
      tag:
        type: string
        default: ""
        description: "Tag to publish (workflow_dispatch only)"
    secrets:
      JFROG_TOKEN:
        required: false
      CARGO_REGISTRY_TOKEN:
        required: false
      GITLEAKS_GH_ACTIONS_KEY:
        required: false
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      CONTAINER_MGT_APP_PRIVATE_KEY:
        required: false

  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true
        description: "Tag to publish (e.g. v1.3.0)"
      runner-mode:
        type: string
        default: ""
        description: "Runner mode override"
      publish-target:
        type: string
        default: "internal"
        description: "Publish destination: internal, oss, or both"
      rust-toolchain:
        type: string
        default: "stable"
        description: "Rust toolchain version"

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

env:
  HYPERCI_PUBLISH_TARGET: ${{ inputs.publish-target }}
  HYPERCI_INSTALL: uvx --no-cache --refresh hyperi-ci
  # When dispatched with a tag, this is a release-channel build —
  # enables Tier 2 (PGO + BOLT) build optimisation. On push events
  # `inputs.tag` is empty and HYPERCI_CHANNEL is also empty, which
  # falls back to `publish.channel` config or "spike" default in
  # hyperi-ci's build.py.
  HYPERCI_CHANNEL: ${{ inputs.tag && 'release' || '' }}

jobs:
  quality:
    name: Quality
    # Renovate branches use lightweight runners — dependency update PRs don't need 16cpu
    runs-on: ${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-quality || vars.GH_RUNNER_RUST || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps rust

      - name: Install Rust toolchain
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          components: clippy, rustfmt

      - name: Cache cargo
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo tools
        run: |
          command -v cargo-audit || cargo install --locked cargo-audit || true
          command -v cargo-deny || cargo install --locked cargo-deny || true

      - name: Run quality checks
        env:
          GITLEAKS_GH_ACTIONS_KEY: ${{ secrets.GITLEAKS_GH_ACTIONS_KEY }}
        run: ${{ env.HYPERCI_INSTALL }} run quality

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Renovate branches use lightweight runners — dependency update PRs don't need 16cpu
        os: ${{ fromJson(startsWith(github.head_ref || github.ref_name, 'renovate/') && format('["{0}"]', vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && '["ubuntu-latest"]' || inputs.test-matrix || format('["{0}"]', inputs.runner-test || vars.GH_RUNNER_RUST || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest')) }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps rust

      - name: Install Rust toolchain
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Cache cargo
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: ${{ env.HYPERCI_INSTALL }} run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-rust-${{ matrix.os }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  setup:
    name: Setup
    needs: [quality, test]
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: matrix
        run: |
          # Renovate branches use lightweight runners — dependency update PRs don't need 16cpu
          AMD64_RUNNER="${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-build || vars.GH_RUNNER_RUST || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}"
          ARM64_RUNNER="${{ vars.GH_RUNNER_ARM64 || 'ubuntu-24.04-arm' }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "matrix={\"include\":[{\"target\":\"x86_64-unknown-linux-gnu\",\"runner\":\"${AMD64_RUNNER}\",\"os_arch\":\"linux-amd64\"},{\"target\":\"aarch64-unknown-linux-gnu\",\"runner\":\"${ARM64_RUNNER}\",\"os_arch\":\"linux-arm64\"}]}" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"include\":[{\"target\":\"x86_64-unknown-linux-gnu\",\"runner\":\"${AMD64_RUNNER}\",\"os_arch\":\"linux-amd64\"}]}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.os_arch }})
    needs: [setup]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.build-matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps rust

      - name: Install Rust toolchain
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Cache cargo
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run build
        env:
          RUST_BUILD_TARGETS: ${{ matrix.target }}
        run: ${{ env.HYPERCI_INSTALL }} run build

      - name: Generate deployment artefacts
        # Runs the freshly built binary's `generate-artefacts` subcommand
        # to emit Dockerfile.runtime + container-manifest.json (+ ArgoCD)
        # into ci-tmp/. MUST run on the Build runner where the toolchain's
        # runtime libs (librdkafka, libssl, etc.) are present — the
        # Container runner is bare and can't load the binary.
        # Skipped silently for projects without a deployment contract.
        run: ${{ env.HYPERCI_INSTALL }} run generate

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-dist-${{ matrix.os_arch }}
          path: |
            dist/
            ci-tmp/
          if-no-files-found: ignore
          retention-days: 1

  container:
    name: Container
    needs: [build]
    # Branch/PR pushes skip this job entirely. Push-to-main runs in
    # validate mode (build, no push). Release dispatch runs with --push
    # to whichever registries publish.target resolves to.
    if: |
      github.event.pull_request.head.repo.fork != true && (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Check container enabled
        # publish.container.enabled is three-state: auto | true | false.
        # `false` skips the rest of this job. `auto` and `true` proceed
        # to login + build; the handler resolves auto via signal
        # detection (Dockerfile or rustlib contract source) and skips
        # silently when no signal is present.
        id: check
        run: |
          if [ -f .hyperi-ci.yaml ]; then
            enabled=$(python3 -c "import yaml; c=yaml.safe_load(open('.hyperi-ci.yaml')) or {}; print(str(c.get('publish',{}).get('container',{}).get('enabled','auto')).lower())" 2>/dev/null || echo "auto")
          else
            enabled="auto"
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        # The build-dist-* artifact carries both dist/ (binaries) and
        # ci-tmp/ (deployment artefacts produced by the Build stage).
        # Download into the project root so both trees land at their
        # original paths — Container stage looks for dist/<binary> and
        # ci-tmp/container-manifest.json relative to cwd.
        if: steps.check.outputs.enabled != 'false'
        uses: actions/download-artifact@v8
        with:
          pattern: build-dist-*
          path: .
          merge-multiple: true

      - name: Docker Hub login (authenticated pulls only)
        # Docker Hub is not a publish target — login is solely to bypass
        # anonymous rate limits when the Dockerfile pulls a Hub base
        # image. Conditional on the org var being set; no-op otherwise.
        if: steps.check.outputs.enabled != 'false' && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: GHCR login
        # GITHUB_TOKEN via job-level packages:write permission — can create
        # new repo-owned packages on first push.
        if: steps.check.outputs.enabled != 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: JFrog Docker login
        # Required when publish.target resolves to internal or both. The
        # registry resolver writes the JFrog tag; this step authenticates
        # the push. No-op if vars.JFROG_DOMAIN is unset.
        if: steps.check.outputs.enabled != 'false' && (inputs.publish-target == 'internal' || inputs.publish-target == 'both') && vars.JFROG_DOMAIN != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.JFROG_DOMAIN }}
          username: ${{ secrets.JFROG_USERNAME }}
          password: ${{ secrets.JFROG_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.enabled != 'false'
        uses: docker/setup-buildx-action@v4

      - name: Install uv
        if: steps.check.outputs.enabled != 'false'
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: false

      - name: Set up Python
        if: steps.check.outputs.enabled != 'false'
        run: uv python install 3.12

      - name: Build container
        # Handler decides validate-only vs push based on event type:
        # push-to-main → build, no push; workflow_dispatch → push.
        if: steps.check.outputs.enabled != 'false'
        env:
          HYPERCI_PUBLISH_TARGET: ${{ inputs.publish-target }}
        run: ${{ env.HYPERCI_INSTALL }} run container

  release:
    name: Release
    needs: [quality, test, build, container]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install semantic-release
        run: >-
          npm install -g
          semantic-release@25
          @semantic-release/commit-analyzer
          @semantic-release/release-notes-generator
          @semantic-release/changelog
          @semantic-release/exec
          @semantic-release/git
          conventional-changelog-conventionalcommits

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  publish:
    name: Publish
    needs: [build, container]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Check for VERSION
        id: check
        run: |
          if [ -f VERSION ]; then
            echo "has_version=true" >> "$GITHUB_OUTPUT"
            echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          else
            echo "has_version=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker Hub login
        if: steps.check.outputs.has_version == 'true' && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: GHCR login
        # GITHUB_TOKEN via job-level packages:write permission — can create
        # new repo-owned packages on first push.
        if: steps.check.outputs.has_version == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifacts
        # Build job uploads both dist/ and ci-tmp/ trees — extract at
        # the project root so paths land where consumers expect them.
        if: steps.check.outputs.has_version == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: build-dist-*
          path: .
          merge-multiple: true

      - name: Install Rust toolchain
        if: steps.check.outputs.has_version == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Install uv
        if: steps.check.outputs.has_version == 'true'
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: false

      - name: Set up Python
        if: steps.check.outputs.has_version == 'true'
        run: uv python install 3.12

      - name: Publish
        if: steps.check.outputs.has_version == 'true'
        env:
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: ${{ env.HYPERCI_INSTALL }} run publish
