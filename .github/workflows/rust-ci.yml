# Project:   HyperI CI
# File:      .github/workflows/rust-ci.yml
# Purpose:   Reusable Rust CI workflow for consumer projects
#
# License:   BUSL-1.1 — HYPERI PTY LIMITED
# Copyright: (c) 2026 HYPERI PTY LIMITED
#
# Rust-specific stages: quality, test, setup, build (with version stamp).
# Container + tag-and-publish are delegated to the shared
# _release-tail.yml workflow. Setup uses the shared predict-version
# composite action to avoid duplicating gate+dry-run across languages.

name: Rust CI

on:
  workflow_call:
    inputs:
      runner-mode:
        type: string
        default: ""
        description: "Runner mode: 'free' forces ubuntu-latest, empty uses GH_RUNNER_* vars"
      publish-target:
        type: string
        default: "oss"
        description: "Publish destination (legacy field, ignored — every publish goes to OSS registries)"
      rust-toolchain:
        type: string
        default: "stable"
        description: "Rust toolchain version"
      runner-quality:
        type: string
        default: ""
        description: "Runner for quality job (default: ubuntu-latest)"
      runner-test:
        type: string
        default: ""
        description: "Runner for test job (default: ubuntu-latest)"
      runner-build:
        type: string
        default: ""
        description: "Runner for build job (default: ubuntu-latest)"
      test-matrix:
        type: string
        default: ""
        description: "JSON array of runner OS for test matrix (overrides runner-test)"
      tag:
        type: string
        default: ""
        description: "Tag to publish (workflow_dispatch only)"
      from-head:
        type: string
        default: ""
        description: "'true' on a from-head dispatch (issue #35): release/retry HEAD — the CI creates the tag."
      bump:
        type: string
        default: "auto"
        description: "Version resolution for from-head: auto | patch | minor (forced — release even with no release-worthy commit) | X.Y.Z (exact version)."
      submodules:
        type: string
        default: ""
        description: "Space-separated submodule paths to init after checkout (e.g. 'schemas'). Empty (default) inits nothing. The submodule must be reachable by the job token -- public, or a token with cross-repo read access."
    secrets:
      JFROG_TOKEN:
        required: false
      CARGO_REGISTRY_TOKEN:
        required: false
      GITLEAKS_GH_ACTIONS_KEY:
        required: false
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      CONTAINER_MGT_APP_PRIVATE_KEY:
        required: false

  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: false
        default: ""
        description: "Tag to re-publish (existing tag). Omit + set from-head to release HEAD."
      from-head:
        type: string
        required: false
        default: ""
        description: "'true' to release/retry the current HEAD — the CI creates the tag (issue #35). Mutually exclusive with `tag`."
      bump:
        type: string
        required: false
        default: "auto"
        description: "Version resolution for from-head: auto | patch | minor (forced) | X.Y.Z (exact version)."
      runner-mode:
        type: string
        default: ""
        description: "Runner mode override"
      publish-target:
        type: string
        default: "oss"
        description: "Publish destination (legacy field, ignored — every publish goes to OSS registries)"
      rust-toolchain:
        type: string
        default: "stable"
        description: "Rust toolchain version"

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

env:
  HYPERCI_PUBLISH_TARGET: ${{ inputs.publish-target }}
  HYPERCI_INSTALL: uvx --no-cache --refresh hyperi-ci
  # Release-channel (Tier 2 PGO + BOLT) when dispatched with a tag (retroactive
  # publish), or `publish-target: both`, or a from-head dispatch (issue #35 —
  # a from-head release is GA, not a dev pre-release).
  HYPERCI_CHANNEL: ${{ (inputs.tag != '' || inputs.publish-target == 'both' || inputs.from-head == 'true') && 'release' || '' }}

jobs:
  # ---------------------------------------------------------------------------
  # plan — runs FIRST. Computes gate outputs that every downstream job
  # reads. See docs/ARCHITECTURE.md for the full contract.
  #
  # Doctrine: a non-bumping commit (chore/docs/test/refactor/style/build/
  # ci/cleanup/...) MUST NOT cause cargo to compile or docker buildx to
  # push. Even quality + test are skipped on push events that won't ship
  # — only PR review and release-worthy pushes run them. The gate is
  # computed ONCE here and consumed by every downstream `if:`; do not
  # re-implement the condition string elsewhere — a pytest test
  # (tests/unit/test_workflow_consistency.py) enforces this.
  # ---------------------------------------------------------------------------
  plan:
    name: Plan
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    outputs:
      run-checks: ${{ steps.predict.outputs.run-checks }}
      run-build: ${{ steps.predict.outputs.run-build }}
      will-publish: ${{ steps.predict.outputs.will-publish }}
      next-version: ${{ steps.predict.outputs.version }}
      build-matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0  # full history — semantic-release dry-run reads it

      - name: Predict version + derive gates
        id: predict
        uses: hyperi-io/hyperi-ci/.github/actions/predict-version@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          from-head: ${{ inputs.from-head }}
          bump: ${{ inputs.bump }}

      - name: Generate build matrix
        # Multi-arch (amd64 + arm64) on publish runs; single-arch on
        # validate-only — arm64 is slow on shared runners and wasteful
        # when nothing's being shipped.
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          AMD64_RUNNER="${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-build || vars.GH_RUNNER_RUST || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}"
          ARM64_RUNNER="${{ vars.GH_RUNNER_ARM64 || 'ubuntu-24.04-arm' }}"
          if [[ "${{ steps.predict.outputs.run-build }}" == "true" ]]; then
            matrix='{"include":[{"target":"x86_64-unknown-linux-gnu","runner":"'"$AMD64_RUNNER"'","os_arch":"linux-amd64"},{"target":"aarch64-unknown-linux-gnu","runner":"'"$ARM64_RUNNER"'","os_arch":"linux-arm64"}]}'
          else
            matrix='{"include":[{"target":"x86_64-unknown-linux-gnu","runner":"'"$AMD64_RUNNER"'","os_arch":"linux-amd64"}]}'
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  quality:
    name: Quality
    needs: [plan]
    if: needs.plan.outputs.run-checks == 'true'
    # Renovate branches use lightweight runners — dependency update PRs don't need 16cpu
    runs-on: ${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-quality || vars.GH_RUNNER_RUST || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup runtime (uv + Python + native deps)
        uses: hyperi-io/hyperi-ci/.github/actions/setup-runtime@main
        with:
          language: rust

      - name: Install Rust toolchain
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          components: clippy, rustfmt

      - name: Cache cargo
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo tools
        # NB: no `|| true` — fail the job if cargo-audit/cargo-deny
        # can't be installed. Quality stage runs them and silent absence
        # would mask supply-chain risks.
        run: |
          command -v cargo-audit || cargo install --locked cargo-audit
          command -v cargo-deny || cargo install --locked cargo-deny

      - name: Setup osv-scanner
        uses: hyperi-io/hyperi-ci/.github/actions/setup-osv-scanner@main

      - name: Deepen history for commit validation
        # The quality checkout is depth-1; commit validation (issue #52) needs
        # the pushed range before..after, which includes `before` and any
        # merge-imported commits. Deepen so the range resolves. Harmless on an
        # already-full clone. If skipped, the quality stage validates HEAD only
        # and warns loudly -- it never silently passes having checked nothing.
        if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
        run: git fetch --deepen=200 origin

      - name: Run quality checks
        env:
          GITLEAKS_GH_ACTIONS_KEY: ${{ secrets.GITLEAKS_GH_ACTIONS_KEY }}
        run: ${{ env.HYPERCI_INSTALL }} run quality

  test:
    name: Test
    needs: [plan]
    if: needs.plan.outputs.run-checks == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ fromJson(startsWith(github.head_ref || github.ref_name, 'renovate/') && format('["{0}"]', vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && '["ubuntu-latest"]' || inputs.test-matrix || format('["{0}"]', inputs.runner-test || vars.GH_RUNNER_RUST || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest')) }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup runtime (uv + Python + native deps)
        uses: hyperi-io/hyperi-ci/.github/actions/setup-runtime@main
        with:
          language: rust

      - name: Install Rust toolchain
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Cache cargo
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Init submodules
        if: ${{ inputs.submodules != '' }}
        env:
          SUBMODULES: ${{ inputs.submodules }}
        run: git submodule update --init --depth 1 $SUBMODULES

      - name: Run tests
        run: ${{ env.HYPERCI_INSTALL }} run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-rust-${{ matrix.os }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build (${{ matrix.os_arch }})
    needs: [plan, quality, test]
    if: needs.plan.outputs.run-build == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJson(needs.plan.outputs.build-matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Stamp predicted version
        # Version-first pipeline: write the version we're about to tag
        # into Cargo.toml + VERSION before `cargo build`, so the binary
        # has the correct CARGO_PKG_VERSION baked in. Without this we'd
        # publish a v1.18.3 release containing a binary that introspects
        # itself as 1.18.2 — every metrics dashboard would lie.
        #
        # Runs on push AND on a from-head dispatch (issue #35) — both
        # release HEAD, whose committed tree is stale under the tagger-only
        # model (the bumped version is never committed). next-version is the
        # resolved value (semantic-release on auto, last+bump on a forced
        # patch/minor, or the explicit X.Y.Z override). A plain `tag`
        # dispatch is skipped: it checks out the tag's own tree, already
        # correct. Validate-only runs are skipped too (nothing ships).
        if: needs.plan.outputs.will-publish == 'true' && (github.event_name == 'push' || inputs.from-head == 'true')
        run: |
          version="${{ needs.plan.outputs.next-version }}"
          if [[ -z "$version" ]]; then
            echo "::error::next-version output empty — plan.predict step must populate it"
            exit 1
          fi
          echo "Stamping version: $version"

          if grep -qE '^\[package\]' Cargo.toml; then
            sed -i -E "/^\[package\]/,/^\[/ s/^version[[:space:]]*=[[:space:]]*\"[^\"]*\"/version = \"$version\"/" Cargo.toml
          fi

          if grep -qE '^\[workspace\.package\]' Cargo.toml; then
            sed -i -E "/^\[workspace\.package\]/,/^\[/ s/^version[[:space:]]*=[[:space:]]*\"[^\"]*\"/version = \"$version\"/" Cargo.toml
          fi

          if [[ -f VERSION ]]; then
            echo "$version" > VERSION
          fi

          echo "--- Cargo.toml after stamp:"
          grep -E '^version[[:space:]]*=' Cargo.toml | head -3
          [[ -f VERSION ]] && echo "--- VERSION: $(cat VERSION)"

      - name: Setup runtime (uv + Python + native deps)
        uses: hyperi-io/hyperi-ci/.github/actions/setup-runtime@main
        with:
          language: rust

      - name: Install Rust toolchain
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Cache cargo
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run build
        env:
          RUST_BUILD_TARGETS: ${{ matrix.target }}
        run: ${{ env.HYPERCI_INSTALL }} run build

      - name: Generate deployment artefacts
        # Runs the freshly built binary's `generate-artefacts` subcommand
        # to emit Dockerfile.runtime + container-manifest.json (+ ArgoCD)
        # into ci-tmp/. MUST run on the Build runner where the toolchain's
        # runtime libs (librdkafka, libssl, etc.) are present.
        # Skipped silently for projects without a deployment contract.
        run: ${{ env.HYPERCI_INSTALL }} run generate

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-dist-${{ matrix.os_arch }}
          path: |
            dist/
            ci-tmp/
          if-no-files-found: ignore
          retention-days: 1

  release-tail:
    name: Release tail
    needs: [plan, build]
    uses: hyperi-io/hyperi-ci/.github/workflows/_release-tail.yml@main
    with:
      language: rust
      will-publish: ${{ needs.plan.outputs.will-publish }}
      next-version: ${{ needs.plan.outputs.next-version }}
      tag: ${{ inputs.tag }}
      from-head: ${{ inputs.from-head }}
      bump: ${{ inputs.bump }}
      publish-target: ${{ inputs.publish-target }}
      rust-toolchain: ${{ inputs.rust-toolchain }}
      submodules: ${{ inputs.submodules }}
    secrets: inherit
