# Project:   HyperI CI
# File:      .github/workflows/python-ci.yml
# Purpose:   Reusable Python CI workflow for consumer projects
#
# License:   Proprietary — HYPERI PTY LIMITED
# Copyright: (c) 2026 HYPERI PTY LIMITED
#
# Python-specific stages: quality, test, setup, build (with version stamp).
# Container + tag-and-publish are delegated to the shared
# _release-tail.yml workflow. Setup uses the shared predict-version
# composite action.

name: Python CI

on:
  workflow_call:
    inputs:
      runner-mode:
        type: string
        default: ""
        description: "Runner mode: 'free' forces ubuntu-latest"
      publish-target:
        type: string
        default: "oss"
        description: "Publish destination: oss (default, FOSS), internal (deprecated, JFrog), or both"
      python-version:
        type: string
        default: "3.12"
        description: "Python version to use"
      runner-quality:
        type: string
        default: ""
      runner-test:
        type: string
        default: ""
      runner-build:
        type: string
        default: ""
      test-matrix:
        type: string
        default: ""
        description: "JSON array of runner OS for test matrix"
      tag:
        type: string
        default: ""
        description: "Tag to publish (workflow_dispatch only)"
    secrets:
      JFROG_TOKEN:
        required: false
      JFROG_USERNAME:
        required: false
      PYPI_TOKEN:
        required: false
      GITLEAKS_GH_ACTIONS_KEY:
        required: false
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      CONTAINER_MGT_APP_PRIVATE_KEY:
        required: false

  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true
        description: "Tag to publish (e.g. v1.3.0)"
      runner-mode:
        type: string
        default: ""
      publish-target:
        type: string
        default: "oss"
      python-version:
        type: string
        default: "3.12"

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

env:
  HYPERCI_PUBLISH_TARGET: ${{ inputs.publish-target }}
  HYPERCI_INSTALL: uvx --no-cache --refresh hyperi-ci

jobs:
  quality:
    name: Quality
    runs-on: ${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-quality || vars.GH_RUNNER_PYTHON || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install ${{ inputs.python-version }}

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps python

      # DO NOT add UV_EXTRA_INDEX_URL here.
      # uv does NOT work like pip with mixed public+private indices. By default
      # uv uses first-match-wins per package name — if JFrog returns an empty
      # 200 for a package it doesn't have (e.g. hatchling), uv stops there and
      # reports "no versions found" rather than falling back to PyPI.
      # Workaround exists (UV_INDEX_STRATEGY=unsafe-best-match) but is fragile.
      # Projects that need private JFrog packages configure [tool.uv.index] with
      # explicit=true in their own pyproject.toml — not here.
      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run quality checks
        env:
          GITLEAKS_GH_ACTIONS_KEY: ${{ secrets.GITLEAKS_GH_ACTIONS_KEY }}
        run: ${{ env.HYPERCI_INSTALL }} run quality

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ fromJson(startsWith(github.head_ref || github.ref_name, 'renovate/') && format('["{0}"]', vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && '["ubuntu-latest"]' || inputs.test-matrix || format('["{0}"]', inputs.runner-test || vars.GH_RUNNER_PYTHON || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest')) }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install ${{ inputs.python-version }}

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps python

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run tests
        run: ${{ env.HYPERCI_INSTALL }} run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-python-${{ matrix.os }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  setup:
    name: Setup
    needs: [quality, test]
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    outputs:
      will-publish: ${{ steps.predict.outputs.will-publish }}
      next-version: ${{ steps.predict.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Predict version (gate + dry-run)
        id: predict
        uses: hyperi-io/hyperi-ci/.github/actions/predict-version@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build
    needs: [setup]
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-build || vars.GH_RUNNER_PYTHON || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Stamp predicted version
        # Version-first pipeline: write the version we're about to tag
        # into pyproject.toml + VERSION before the wheel/sdist is built,
        # so importlib.metadata.version("<pkg>") returns the right value
        # at runtime. Skipped on workflow_dispatch (the checked-out tag's
        # source already has the right version).
        if: needs.setup.outputs.will-publish == 'true' && github.event_name == 'push'
        run: |
          version="${{ needs.setup.outputs.next-version }}"
          if [[ -z "$version" ]]; then
            echo "::error::next-version output empty"
            exit 1
          fi
          echo "Stamping version: $version"

          # PEP 621 [project] version = "..." — covers static-version projects.
          # Dynamic-version projects (setuptools-scm, hatch-vcs) read from VCS
          # and don't need this rewrite; the VERSION file write below covers
          # them since semantic-release's prepareCmd also writes VERSION.
          # Sed scoped to the [project] table — same approach as the
          # Cargo.toml stamp in rust-ci.yml.
          if [[ -f pyproject.toml ]] && grep -qE '^\[project\]' pyproject.toml; then
            sed -i -E "/^\[project\]/,/^\[/ s/^version[[:space:]]*=[[:space:]]*\"[^\"]*\"/version = \"$version\"/" pyproject.toml
            echo "Stamped pyproject.toml"
          fi

          if [[ -f VERSION ]]; then
            echo "$version" > VERSION
            echo "Stamped VERSION"
          fi

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install ${{ inputs.python-version }}

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps python

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run build
        run: ${{ env.HYPERCI_INSTALL }} run build

      - name: Generate deployment artefacts
        # Pylib's Application.deployment_contract() emits Dockerfile.runtime +
        # container-manifest.json (+ ArgoCD) into ci-tmp/. Skipped silently
        # for projects without a deployment contract.
        run: ${{ env.HYPERCI_INSTALL }} run generate

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-dist-default
          path: |
            dist/
            ci-tmp/
          if-no-files-found: ignore
          retention-days: 1

  release-tail:
    name: Release tail
    needs: [setup, build]
    uses: hyperi-io/hyperi-ci/.github/workflows/_release-tail.yml@main
    with:
      language: python
      will-publish: ${{ needs.setup.outputs.will-publish }}
      tag: ${{ inputs.tag }}
      publish-target: ${{ inputs.publish-target }}
      python-version: ${{ inputs.python-version }}
    secrets: inherit
