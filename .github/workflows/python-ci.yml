# Project:   HyperI CI
# File:      .github/workflows/python-ci.yml
# Purpose:   Reusable Python CI workflow for consumer projects
#
# License:   BUSL-1.1 — HYPERI PTY LIMITED
# Copyright: (c) 2026 HYPERI PTY LIMITED
#
# Python-specific stages: quality, test, setup, build (with version stamp).
# Container + tag-and-publish are delegated to the shared
# _release-tail.yml workflow. Setup uses the shared predict-version
# composite action.

name: Python CI

on:
  workflow_call:
    inputs:
      runner-mode:
        type: string
        default: ""
        description: "Runner mode: 'free' forces ubuntu-latest"
      publish-target:
        type: string
        default: "oss"
        description: "Publish destination (legacy field, ignored — every publish goes to OSS registries)"
      python-version:
        type: string
        default: "3.12"
        description: "Python version to use"
      runner-quality:
        type: string
        default: ""
      runner-test:
        type: string
        default: ""
      runner-build:
        type: string
        default: ""
      test-matrix:
        type: string
        default: ""
        description: "JSON array of runner OS for test matrix"
      tag:
        type: string
        default: ""
        description: "Tag to publish (workflow_dispatch only)"
      from-head:
        type: string
        default: ""
        description: "'true' on a from-head dispatch (issue #35): release/retry HEAD — the CI creates the tag."
      bump:
        type: string
        default: "auto"
        description: "Version resolution for from-head: auto | patch | minor (forced) | X.Y.Z (exact version)."
      submodules:
        type: string
        default: ""
        description: "Space-separated submodule paths to init after checkout (e.g. 'schemas'). Empty (default) inits nothing. The submodule must be reachable by the job token -- public, or a token with cross-repo read access."
    secrets:
      JFROG_TOKEN:
        required: false
      JFROG_USERNAME:
        required: false
      PYPI_TOKEN:
        required: false
      GITLEAKS_GH_ACTIONS_KEY:
        required: false
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      CONTAINER_MGT_APP_PRIVATE_KEY:
        required: false

  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: false
        default: ""
        description: "Tag to re-publish (existing tag). Omit + set from-head to release HEAD."
      from-head:
        type: string
        required: false
        default: ""
        description: "'true' to release/retry the current HEAD — the CI creates the tag (issue #35). Mutually exclusive with `tag`."
      bump:
        type: string
        required: false
        default: "auto"
        description: "Version resolution for from-head: auto | patch | minor (forced) | X.Y.Z (exact version)."
      runner-mode:
        type: string
        default: ""
      publish-target:
        type: string
        default: "oss"
      python-version:
        type: string
        default: "3.12"

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

env:
  HYPERCI_PUBLISH_TARGET: ${{ inputs.publish-target }}
  HYPERCI_INSTALL: uvx --no-cache --refresh hyperi-ci

jobs:
  # ---------------------------------------------------------------------------
  # plan — runs FIRST. Computes gate outputs; downstream jobs read them.
  # See docs/ARCHITECTURE.md. Gate strings duplicated across languages
  # are enforced by tests/unit/test_workflow_consistency.py.
  # ---------------------------------------------------------------------------
  plan:
    name: Plan
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    outputs:
      run-checks: ${{ steps.predict.outputs.run-checks }}
      run-build: ${{ steps.predict.outputs.run-build }}
      will-publish: ${{ steps.predict.outputs.will-publish }}
      next-version: ${{ steps.predict.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0  # full history — semantic-release dry-run reads it

      - name: Predict version + derive gates
        id: predict
        uses: hyperi-io/hyperi-ci/.github/actions/predict-version@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          from-head: ${{ inputs.from-head }}
          bump: ${{ inputs.bump }}

  quality:
    name: Quality
    needs: [plan]
    if: needs.plan.outputs.run-checks == 'true'
    runs-on: ${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-quality || vars.GH_RUNNER_PYTHON || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install ${{ inputs.python-version }}

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps python

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run quality checks
        env:
          GITLEAKS_GH_ACTIONS_KEY: ${{ secrets.GITLEAKS_GH_ACTIONS_KEY }}
        run: ${{ env.HYPERCI_INSTALL }} run quality

  test:
    name: Test
    needs: [plan]
    if: needs.plan.outputs.run-checks == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ fromJson(startsWith(github.head_ref || github.ref_name, 'renovate/') && format('["{0}"]', vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && '["ubuntu-latest"]' || inputs.test-matrix || format('["{0}"]', inputs.runner-test || vars.GH_RUNNER_PYTHON || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest')) }}
    # Service containers required by integration tests.
    # Always-on: harmless overhead for consumers that don't use them
    # (job runs `psql` etc. against localhost ports). pylib's
    # tests/conftest.py postgres fixture finds these via the
    # `postgresql://postgres:postgres@localhost:5432/hyperi_pylib_test`
    # DSN; matches pylib's docker-compose.postgres.yml.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hyperi_pylib_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hyperi_pylib_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install ${{ inputs.python-version }}

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps python

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Init submodules
        if: ${{ inputs.submodules != '' }}
        env:
          SUBMODULES: ${{ inputs.submodules }}
        run: git submodule update --init --depth 1 $SUBMODULES

      - name: Run tests
        run: ${{ env.HYPERCI_INSTALL }} run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-python-${{ matrix.os }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build
    needs: [plan, quality, test]
    if: needs.plan.outputs.run-build == 'true'
    runs-on: ${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-build || vars.GH_RUNNER_PYTHON || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Stamp predicted version
        # Version-first pipeline: write the version we're about to tag
        # into pyproject.toml + VERSION before the wheel/sdist is built,
        # so importlib.metadata.version("<pkg>") returns the right value
        # at runtime. Runs on push AND on a from-head dispatch (issue #35):
        # both release HEAD, whose committed tree is stale (tagger-only).
        # A plain `tag` dispatch is skipped (the tag's tree is correct).
        if: needs.plan.outputs.will-publish == 'true' && (github.event_name == 'push' || inputs.from-head == 'true')
        run: |
          version="${{ needs.plan.outputs.next-version }}"
          if [[ -z "$version" ]]; then
            echo "::error::next-version output empty"
            exit 1
          fi
          echo "Stamping version: $version"

          # PEP 621 [project] version = "..." — covers static-version projects.
          # Dynamic-version projects (setuptools-scm, hatch-vcs) read from VCS
          # and don't need this rewrite; the VERSION file write below covers
          # them since semantic-release's prepareCmd also writes VERSION.
          # Sed scoped to the [project] table — same approach as the
          # Cargo.toml stamp in rust-ci.yml.
          if [[ -f pyproject.toml ]] && grep -qE '^\[project\]' pyproject.toml; then
            sed -i -E "/^\[project\]/,/^\[/ s/^version[[:space:]]*=[[:space:]]*\"[^\"]*\"/version = \"$version\"/" pyproject.toml
            echo "Stamped pyproject.toml"
          fi

          if [[ -f VERSION ]]; then
            echo "$version" > VERSION
            echo "Stamped VERSION"
          fi

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install ${{ inputs.python-version }}

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps python

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run build
        run: ${{ env.HYPERCI_INSTALL }} run build

      - name: Generate deployment artefacts
        # Pylib's Application.deployment_contract() emits Dockerfile.runtime +
        # container-manifest.json (+ ArgoCD) into ci-tmp/. Skipped silently
        # for projects without a deployment contract.
        run: ${{ env.HYPERCI_INSTALL }} run generate

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-dist-default
          path: |
            dist/
            ci-tmp/
          if-no-files-found: ignore
          retention-days: 1

  release-tail:
    name: Release tail
    needs: [plan, build]
    uses: hyperi-io/hyperi-ci/.github/workflows/_release-tail.yml@main
    with:
      language: python
      will-publish: ${{ needs.plan.outputs.will-publish }}
      next-version: ${{ needs.plan.outputs.next-version }}
      tag: ${{ inputs.tag }}
      from-head: ${{ inputs.from-head }}
      bump: ${{ inputs.bump }}
      publish-target: ${{ inputs.publish-target }}
      python-version: ${{ inputs.python-version }}
    secrets: inherit
