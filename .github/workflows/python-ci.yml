name: Python CI

on:
  workflow_call:
    inputs:
      runner-mode:
        type: string
        default: ""
        description: "Runner mode: 'free' forces ubuntu-latest, empty uses GH_RUNNER_* vars"
      publish-target:
        type: string
        default: "internal"
        description: "Publish destination: internal, oss, or both"
      python-version:
        type: string
        default: "3.12"
        description: "Python version to use"
      runner-quality:
        type: string
        default: ""
        description: "Runner for quality job"
      runner-test:
        type: string
        default: ""
        description: "Runner for test job"
      runner-build:
        type: string
        default: ""
        description: "Runner for build job"
      test-matrix:
        type: string
        default: ""
        description: "JSON array of runner OS for test matrix (overrides runner-test)"
      tag:
        type: string
        default: ""
        description: "Tag to publish (workflow_dispatch only)"
    secrets:
      JFROG_TOKEN:
        required: false
      JFROG_USERNAME:
        required: false
      PYPI_TOKEN:
        required: false
      GITLEAKS_GH_ACTIONS_KEY:
        required: false
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      CONTAINER_MGT_APP_PRIVATE_KEY:
        required: false

  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true
        description: "Tag to publish (e.g. v1.3.0)"
      runner-mode:
        type: string
        default: ""
        description: "Runner mode override"
      publish-target:
        type: string
        default: "internal"
        description: "Publish destination: internal, oss, or both"
      python-version:
        type: string
        default: "3.12"
        description: "Python version to use"

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

env:
  HYPERCI_PUBLISH_TARGET: ${{ inputs.publish-target }}
  HYPERCI_INSTALL: uvx --no-cache --refresh hyperi-ci

jobs:
  quality:
    name: Quality
    # Renovate branches use lightweight runners — dependency update PRs don't need large runners
    runs-on: ${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-quality || vars.GH_RUNNER_PYTHON || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install ${{ inputs.python-version }}

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps python

      # DO NOT add UV_EXTRA_INDEX_URL here.
      # uv does NOT work like pip with mixed public+private indices. By default
      # uv uses first-match-wins per package name — if JFrog returns an empty
      # 200 for a package it doesn't have (e.g. hatchling), uv stops there and
      # reports "no versions found" rather than falling back to PyPI.
      # Workaround exists (UV_INDEX_STRATEGY=unsafe-best-match) but is fragile.
      # Projects that need private JFrog packages configure [tool.uv.index] with
      # explicit=true in their own pyproject.toml — not here.
      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run quality checks
        env:
          GITLEAKS_GH_ACTIONS_KEY: ${{ secrets.GITLEAKS_GH_ACTIONS_KEY }}
        run: ${{ env.HYPERCI_INSTALL }} run quality

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Renovate branches use lightweight runners
        os: ${{ fromJson(startsWith(github.head_ref || github.ref_name, 'renovate/') && format('["{0}"]', vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && '["ubuntu-latest"]' || inputs.test-matrix || format('["{0}"]', inputs.runner-test || vars.GH_RUNNER_PYTHON || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest')) }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install ${{ inputs.python-version }}

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps python

      # DO NOT add UV_EXTRA_INDEX_URL here — see quality job comment.
      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run tests
        run: ${{ env.HYPERCI_INSTALL }} run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-python-${{ matrix.os }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build
    needs: [quality, test]
    if: github.event.pull_request.head.repo.fork != true
    # Renovate branches use lightweight runners
    runs-on: ${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-build || vars.GH_RUNNER_PYTHON || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install ${{ inputs.python-version }}

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps python

      # DO NOT add UV_EXTRA_INDEX_URL here — see quality job comment.
      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run build
        run: ${{ env.HYPERCI_INSTALL }} run build

  container:
    name: Container
    needs: [build]
    # Branch/PR pushes skip this job entirely. Push-to-main runs in
    # validate mode (build, no push). Release dispatch runs with --push
    # to whichever registries publish.target resolves to.
    if: |
      github.event.pull_request.head.repo.fork != true && (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Check container enabled
        # publish.container.enabled is three-state: auto | true | false.
        # `false` skips the rest of this job. `auto` and `true` proceed
        # to login + build; the handler resolves auto via signal
        # detection (Dockerfile or template applicable) and skips
        # silently when no signal is present.
        id: check
        run: |
          if [ -f .hyperi-ci.yaml ]; then
            enabled=$(python3 -c "import yaml; c=yaml.safe_load(open('.hyperi-ci.yaml')) or {}; print(str(c.get('publish',{}).get('container',{}).get('enabled','auto')).lower())" 2>/dev/null || echo "auto")
          else
            enabled="auto"
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Docker Hub login (authenticated pulls only)
        # Docker Hub is not a publish target — login is solely to bypass
        # anonymous rate limits when the Dockerfile pulls a Hub base
        # image. Conditional on the org var being set; no-op otherwise.
        if: steps.check.outputs.enabled != 'false' && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: GHCR login
        # GITHUB_TOKEN via job-level packages:write permission — can create
        # new repo-owned packages on first push.
        if: steps.check.outputs.enabled != 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: JFrog Docker login
        if: steps.check.outputs.enabled != 'false' && (inputs.publish-target == 'internal' || inputs.publish-target == 'both') && vars.JFROG_DOMAIN != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.JFROG_DOMAIN }}
          username: ${{ secrets.JFROG_USERNAME }}
          password: ${{ secrets.JFROG_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.enabled != 'false'
        uses: docker/setup-buildx-action@v4

      - name: Install uv
        if: steps.check.outputs.enabled != 'false'
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: false

      - name: Set up Python
        if: steps.check.outputs.enabled != 'false'
        run: uv python install ${{ inputs.python-version }}

      - name: Build container
        # Handler decides validate-only vs push based on event type:
        # push-to-main → build, no push; workflow_dispatch → push.
        if: steps.check.outputs.enabled != 'false'
        env:
          HYPERCI_PUBLISH_TARGET: ${{ inputs.publish-target }}
        run: ${{ env.HYPERCI_INSTALL }} run container

  release:
    name: Release
    needs: [quality, test, build, container]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install semantic-release
        run: >-
          npm install -g
          semantic-release@25
          @semantic-release/commit-analyzer
          @semantic-release/release-notes-generator
          @semantic-release/changelog
          @semantic-release/exec
          @semantic-release/git
          conventional-changelog-conventionalcommits

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  publish:
    name: Publish
    needs: [build, container]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Check for VERSION
        id: check
        run: |
          if [ -f VERSION ]; then
            echo "has_version=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_version=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker Hub login
        if: steps.check.outputs.has_version == 'true' && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: GHCR login
        # GITHUB_TOKEN via job-level packages:write permission — can create
        # new repo-owned packages on first push.
        if: steps.check.outputs.has_version == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        if: steps.check.outputs.has_version == 'true'
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.check.outputs.has_version == 'true'
        run: uv python install ${{ inputs.python-version }}

      # DO NOT add UV_EXTRA_INDEX_URL here — see quality job comment.
      - name: Install dependencies
        if: steps.check.outputs.has_version == 'true'
        run: uv sync --frozen --all-extras

      - name: Build package
        if: steps.check.outputs.has_version == 'true'
        run: ${{ env.HYPERCI_INSTALL }} run build

      - name: Publish
        if: steps.check.outputs.has_version == 'true'
        env:
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
          JFROG_USERNAME: ${{ secrets.JFROG_USERNAME }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: ${{ env.HYPERCI_INSTALL }} run publish
