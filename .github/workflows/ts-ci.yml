# Project:   HyperI CI
# File:      .github/workflows/ts-ci.yml
# Purpose:   Reusable TypeScript CI workflow for consumer projects
#
# License:   BUSL-1.1 — HYPERI PTY LIMITED
# Copyright: (c) 2026 HYPERI PTY LIMITED
#
# TypeScript-specific stages: quality, test, setup, build (with version
# stamp). Container + tag-and-publish are delegated to the shared
# _release-tail.yml workflow. Setup uses the shared predict-version
# composite action.

name: TypeScript CI

on:
  workflow_call:
    inputs:
      runner-mode:
        type: string
        default: ""
        description: "Runner mode: 'free' forces ubuntu-latest, empty uses GH_RUNNER_* vars"
      publish-target:
        type: string
        default: "oss"
        description: "Publish destination (legacy field, ignored — every publish goes to OSS registries)"
      node-version:
        type: string
        default: "22"
        description: "Node.js version"
      runner-quality:
        type: string
        default: ""
      runner-test:
        type: string
        default: ""
      runner-build:
        type: string
        default: ""
      test-matrix:
        type: string
        default: ""
        description: "JSON array of runner OS for test matrix"
      tag:
        type: string
        default: ""
        description: "Tag to publish (workflow_dispatch only)"
      from-head:
        type: string
        default: ""
        description: "'true' on a from-head dispatch (issue #35): release/retry HEAD — the CI creates the tag."
      bump:
        type: string
        default: "auto"
        description: "Version resolution for from-head: auto | patch | minor (forced) | X.Y.Z (exact version)."
      submodules:
        type: string
        default: ""
        description: "Space-separated submodule paths to init after checkout (e.g. 'schemas'). Empty (default) inits nothing. The submodule must be reachable by the job token - public, or a token with cross-repo read access."
      branch-build:
        type: string
        default: ""
        description: "'true' to run build + container on pull_request events (branch-mode). Also settable repo-wide via the HYPERCI_BRANCH_BUILD variable. Dev-image push is the separate publish.container.dev_push opt-in."
    secrets:
      JFROG_TOKEN:
        required: false
      NPM_TOKEN:
        required: false
      GITLEAKS_GH_ACTIONS_KEY:
        required: false
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      CONTAINER_MGT_APP_PRIVATE_KEY:
        required: false

  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: false
        default: ""
        description: "Tag to re-publish (existing tag). Omit + set from-head to release HEAD."
      from-head:
        type: string
        required: false
        default: ""
        description: "'true' to release/retry the current HEAD — the CI creates the tag (issue #35). Mutually exclusive with `tag`."
      bump:
        type: string
        required: false
        default: "auto"
        description: "Version resolution for from-head: auto | patch | minor (forced) | X.Y.Z (exact version)."
      runner-mode:
        type: string
        default: ""
      publish-target:
        type: string
        default: "oss"
      node-version:
        type: string
        default: "22"

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

env:
  HYPERCI_PUBLISH_TARGET: ${{ inputs.publish-target }}
  # Rehearsal / incident escape hatch: the HYPERCI_INSTALL_OVERRIDE repo
  # variable replaces the CLI install command wholesale — a branch rehearsal
  # points it at `uvx --from git+...@<branch> hyperi-ci`; an incident pins
  # the repo to a known-good `uvx hyperi-ci==X.Y.Z`. Unset = latest PyPI.
  HYPERCI_INSTALL: ${{ vars.HYPERCI_INSTALL_OVERRIDE || 'uvx --no-cache --refresh hyperi-ci' }}
  # Rare edge-case escape hatch: set the HYPERCI_QUALITY_SKIP repo/org
  # variable (e.g. "semgrep") to force-skip a quality tool whose false
  # positive is halting CI, until the real fix lands. Empty when unset.
  HYPERCI_QUALITY_SKIP: ${{ vars.HYPERCI_QUALITY_SKIP }}

# Least-privilege GITHUB_TOKEN default for every job (CodeQL
# actions/missing-workflow-permissions). Two jobs elevate: release-tail
# (passes write down to _release-tail.yml - semantic-release commit/tag +
# GHCR) and plan (semantic-release push-access verify on a publish predict).
# commit-check / quality / test / build are read-only.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # plan — runs FIRST. Computes gate outputs; downstream jobs read them.
  # See docs/ARCHITECTURE.md.
  # ---------------------------------------------------------------------------
  plan:
    name: Plan
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    # predict-version runs semantic-release, whose git plugin verifies push
    # access (a `git push --dry-run`) on a publish predict - needs write.
    permissions:
      contents: write
    outputs:
      run-checks: ${{ steps.predict.outputs.run-checks }}
      run-build: ${{ steps.predict.outputs.run-build }}
      will-publish: ${{ steps.predict.outputs.will-publish }}
      next-version: ${{ steps.predict.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Predict version + derive gates
        id: predict
        uses: hyperi-io/hyperi-ci/.github/actions/predict-version@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          from-head: ${{ inputs.from-head }}
          bump: ${{ inputs.bump }}
          branch-build: ${{ inputs.branch-build || vars.HYPERCI_BRANCH_BUILD }}

  commit-check:
    name: Commit messages
    # Landing gate for conventional-commit messages. Deliberately NOT gated
    # on plan.outputs.run-checks: a cheap git-log + regex check must validate
    # what actually reaches main on EVERY merge, not only publish-worthy
    # pushes (all the quality job covers). Fatal on push to main (what lands);
    # advisory on pull_request (branch commits may be squashed away - see
    # commit_validation.run). Feature-branch pushes skip it, so the fast
    # chore-skip path is untouched. See CLAUDE.md CI gate doctrine.
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - name: Validate commit messages
        run: ${{ env.HYPERCI_INSTALL }} check-commits

  quality:
    name: Quality
    needs: [plan]
    if: needs.plan.outputs.run-checks == 'true'
    runs-on: ${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-quality || vars.GH_RUNNER_TYPESCRIPT || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Node.js
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-deps typescript

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps typescript

      - name: Install osv-scanner
        # Malicious-package (MAL-*) scanner — covers the OSSF
        # malicious-packages feed that npm/pnpm/yarn audit (CVE-only) do
        # not. Most of ossf/malicious-packages#1276 lived in npm. No
        # `|| true`: in CI the tool must be present (the quality stage
        # skips it only for local dev convenience). Pinned; bump deliberately.
        run: |
          OSV_VERSION=v2.3.8
          case "$(uname -m)" in
            x86_64) OSV_ARCH=amd64 ;;
            aarch64 | arm64) OSV_ARCH=arm64 ;;
            *) echo "::error::unsupported arch $(uname -m) for osv-scanner"; exit 1 ;;
          esac
          mkdir -p "$HOME/.local/bin"
          curl -sSfL -o "$HOME/.local/bin/osv-scanner" \
            "https://github.com/google/osv-scanner/releases/download/${OSV_VERSION}/osv-scanner_linux_${OSV_ARCH}"
          chmod +x "$HOME/.local/bin/osv-scanner"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/osv-scanner" --version

      - name: Deepen history for secret scan
        # gitleaks scans the branch git log for committed secrets; a depth-1
        # checkout would only see HEAD. Deepen so the scan covers the pushed
        # range. Conventional-commit validation moved to the commit-check job
        # (its own fetch-depth: 0 checkout). Harmless on an already-full clone.
        if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
        run: git fetch --deepen=200 origin

      - name: Run quality checks
        env:
          GITLEAKS_GH_ACTIONS_KEY: ${{ secrets.GITLEAKS_GH_ACTIONS_KEY }}
        run: ${{ env.HYPERCI_INSTALL }} run quality

  test:
    name: Test
    needs: [plan]
    if: needs.plan.outputs.run-checks == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ fromJson(startsWith(github.head_ref || github.ref_name, 'renovate/') && format('["{0}"]', vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && '["ubuntu-latest"]' || inputs.test-matrix || format('["{0}"]', inputs.runner-test || vars.GH_RUNNER_TYPESCRIPT || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest')) }}
    steps:
      - name: Docker Hub login
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Node.js
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-deps typescript

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps typescript

      - name: Init submodules
        if: ${{ inputs.submodules != '' }}
        env:
          SUBMODULES: ${{ inputs.submodules }}
        run: git submodule update --init --depth 1 $SUBMODULES

      - name: Run tests
        run: ${{ env.HYPERCI_INSTALL }} run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-typescript-${{ matrix.os }}
          path: |
            test-results/
            coverage/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build
    needs: [plan, quality, test]
    if: needs.plan.outputs.run-build == 'true'
    runs-on: ${{ startsWith(github.head_ref || github.ref_name, 'renovate/') && (vars.GH_RUNNER_RENOVATE || 'ubuntu-latest') || (inputs.runner-mode || vars.GH_RUNNER_MODE) == 'free' && 'ubuntu-latest' || inputs.runner-build || vars.GH_RUNNER_TYPESCRIPT || vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Stamp predicted version
        # Version-first pipeline: write the version we're about to tag
        # into package.json + VERSION before the bundle is built. npm
        # publish reads package.json's version field at publish time. Runs
        # on push AND on a from-head dispatch (issue #35) — both release
        # HEAD, whose committed tree is stale (tagger-only). A plain `tag`
        # dispatch is skipped (the tag's tree is correct).
        if: needs.plan.outputs.will-publish == 'true' && (github.event_name == 'push' || inputs.from-head == 'true')
        run: |
          version="${{ needs.plan.outputs.next-version }}"
          if [[ -z "$version" ]]; then
            echo "::error::next-version output empty"
            exit 1
          fi
          echo "Stamping version: $version"

          if [[ -f package.json ]]; then
            # npm version --no-git-tag-version updates package.json + lockfile
            # without creating a commit/tag — semantic-release does that later.
            npm version "$version" --no-git-tag-version --allow-same-version
            echo "Stamped package.json"
          fi

          if [[ -f VERSION ]]; then
            echo "$version" > VERSION
            echo "Stamped VERSION"
          fi

      - name: Set up Node.js
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install uv
        if: ${{ !contains(runner.name, 'arc-runner') }}
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Set up Python
        run: |
          command -v uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          command -v python3 || uv python install 3.12

      - name: Install dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-deps typescript

      - name: Install native dependencies
        run: ${{ env.HYPERCI_INSTALL }} install-native-deps typescript

      - name: Run build
        run: ${{ env.HYPERCI_INSTALL }} run build

      - name: Generate deployment artefacts
        # Skipped silently for projects without a deployment contract.
        run: ${{ env.HYPERCI_INSTALL }} run generate

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-dist-default
          path: |
            dist/
            ci-tmp/
          if-no-files-found: ignore
          retention-days: 1

  release-tail:
    name: Release tail
    needs: [plan, build]
    # Elevated + passed to _release-tail.yml: its tag-and-publish job commits +
    # tags (contents), pushes GHCR (packages) and runs the semantic-release GH
    # plugin (issues + pull-requests). Capped by the caller's grant.
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
    uses: hyperi-io/hyperi-ci/.github/workflows/_release-tail.yml@main
    with:
      language: typescript
      will-publish: ${{ needs.plan.outputs.will-publish }}
      next-version: ${{ needs.plan.outputs.next-version }}
      tag: ${{ inputs.tag }}
      from-head: ${{ inputs.from-head }}
      bump: ${{ inputs.bump }}
      publish-target: ${{ inputs.publish-target }}
      submodules: ${{ inputs.submodules }}
    secrets: inherit
