# Project:   HyperI CI
# File:      .github/workflows/_release-tail.yml
# Purpose:   Shared release tail — container + tag-and-publish jobs
#
# License:   BUSL-1.1 — HYPERI PTY LIMITED
# Copyright: (c) 2026 HYPERI PTY LIMITED
#
# Reusable workflow called by language-specific *-ci.yml files. Owns
# the post-build half of the version-first single-run pipeline:
#
#   (caller)  setup     ← uses .github/actions/predict-version
#   (caller)  build     ← stamps Cargo.toml/VERSION with next-version
#                         BEFORE building, uploads dist/ + ci-tmp/
#                         artefacts
#
#   (here)    container         ← docker build (validate or push, gated
#                                  on will-publish)
#   (here)    tag-and-publish   ← npx semantic-release real → tag +
#                                  CHANGELOG; then hyperi-ci run publish
#                                  → artefacts to crates.io / PyPI / npm /
#                                  GHCR / GitHub Releases / Cloudflare R2
#
# Doctrine: tag-on-publish. A git tag exists iff the artefact is in the
# registry. Aligns with kubernetes/rust/python OSS conventions.
#
# Why a shared workflow?
#  - The container, semantic-release, and publish jobs were byte-identical
#    across rust/go/python/ts (the publish job was 100% duplicated).
#  - Future CI plumbing changes (action version pins, registry tweaks,
#    semver discipline) apply once instead of 4×.

name: Release tail (shared)

on:
  workflow_call:
    inputs:
      language:
        type: string
        required: true
        description: "Project language: rust | python | golang | typescript"
      will-publish:
        type: string
        required: true
        description: "'true' if this run should push to registries (from caller's setup output)"
      next-version:
        type: string
        default: ""
        description: "Predicted next version from the caller's plan job. Single source of truth for the container image tag (issue #27): Build stamps it and Tag-and-Publish releases it, so the container must use the same value rather than its own (possibly stale) VERSION file."
      tag:
        type: string
        default: ""
        description: "Tag input — set on workflow_dispatch from caller"
      from-head:
        type: string
        default: ""
        description: "'true' on a from-head dispatch (issue #35): release/retry the current HEAD — the CI creates the tag. Mutually exclusive with `tag`."
      bump:
        type: string
        default: "auto"
        description: "Version resolution for from-head: auto (semantic-release picks from commits) | patch | minor (forced — release even with no release-worthy commit) | X.Y.Z (exact version)."
      publish-target:
        type: string
        default: "internal"
        description: "Publish destination: internal, oss, or both"
      python-version:
        type: string
        default: "3.12"
        description: "Python runtime (used by container/publish toolchain)"
      rust-toolchain:
        type: string
        default: "stable"
        description: "Rust toolchain (only used when language=rust)"

env:
  HYPERCI_INSTALL: uvx --no-cache --refresh hyperi-ci
  HYPERCI_PUBLISH_TARGET: ${{ inputs.publish-target }}
  # When dispatched with a tag, this is a release-channel build —
  # enables Tier 2 (PGO + BOLT) build optimisation.
  HYPERCI_CHANNEL: ${{ inputs.tag && 'release' || '' }}

jobs:
  container:
    name: Container
    # Branch / PR pushes never reach this workflow (caller gates on
    # quality+test+build pre-needs). Pushes to main and
    # workflow_dispatch always reach here:
    #
    # - Validate-only (push to main, will-publish == 'false'):
    #   docker build runs to catch Dockerfile breakages, but no push
    #   to any registry — verifies the Dockerfile is producible
    #   BEFORE we ever try to publish from it.
    # - Publish (will-publish == 'true'): docker build + push to all
    #   configured registries.
    #
    # The push-vs-validate decision lives in container/stage.py keyed
    # off HYPERCI_PUBLISH_MODE — set when will-publish is true.
    if: |
      github.event.pull_request.head.repo.fork != true && (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        # Needed to run the resolve step below. Cheap, no Docker Hub —
        # so a library never pays the Buildx/Docker-Hub cost (issue #33).
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Resolve container build (app vs library)
        # Decide BEFORE booting Buildx whether this project ships a
        # container. enabled:false → no; enabled:true → yes; auto →
        # filesystem signal (Dockerfile or rustlib contract; a crate/
        # library has none). Gating every Docker step on this means a
        # library (e.g. a Rust crate — no GHCR deployment) never pulls
        # buildkit from Docker Hub nor logs in to GHCR (issue #33).
        id: resolve
        env:
          HYPERCI_CONTAINER_RESOLVE_ONLY: "1"
        run: ${{ env.HYPERCI_INSTALL }} run container

      - name: Docker Hub login (authenticated pulls only)
        # Docker Hub is not a publish target — login is solely to bypass
        # anonymous rate limits when the Dockerfile pulls a Hub base
        # image. Conditional on the org var being set; no-op otherwise.
        if: steps.resolve.outputs.build == 'true' && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: GHCR login
        # GITHUB_TOKEN via job-level packages:write permission — can create
        # new repo-owned packages on first push.
        if: steps.resolve.outputs.build == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.resolve.outputs.build == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Download build artifacts
        # The build-dist-* artifact carries both dist/ (binaries) and
        # ci-tmp/ (deployment artefacts produced by the Build stage).
        # Download into the project root so both trees land at their
        # original paths — Container stage looks for dist/<binary> and
        # ci-tmp/container-manifest.json relative to cwd.
        if: steps.resolve.outputs.build == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: build-dist-*
          path: .
          merge-multiple: true

      - name: Set up Python
        if: steps.resolve.outputs.build == 'true'
        run: uv python install ${{ inputs.python-version }}

      - name: Build container
        # Handler decides validate-only vs push based on HYPERCI_PUBLISH_MODE:
        # unset/false → docker build only, no registry push;
        # true        → docker build + push to all configured registries.
        if: steps.resolve.outputs.build == 'true'
        env:
          HYPERCI_PUBLISH_TARGET: ${{ inputs.publish-target }}
          HYPERCI_PUBLISH_MODE: ${{ inputs.will-publish }}
          # Authoritative version for the image tag — same value Build
          # stamps and Tag-and-Publish releases. Without this the stage
          # falls back to the checked-out VERSION file, which is stale on
          # a shallow/tagless container checkout (issue #27).
          HYPERCI_VERSION: ${{ inputs.next-version }}
        run: ${{ env.HYPERCI_INSTALL }} run container

  tag-and-publish:
    name: Tag & Publish
    needs: [container]
    # Runs iff a release is being published — and DECOUPLED from the
    # container outcome (issue #33). `always()` means a failed or skipped
    # Container job does not block the primary publish: a transient
    # container/registry hiccup (e.g. a flaky Docker Hub buildkit pull)
    # must never lose the crate/PyPI/npm + GitHub Release or skip the tag.
    # The container failure still surfaces as a red run for follow-up.
    # On push events this creates the git tag (semantic-release) AND
    # uploads artefacts. On workflow_dispatch (retroactive) the tag
    # already exists; only the upload runs.
    if: ${{ always() && inputs.will-publish == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # On push OR a from-head dispatch (issue #35), check out main HEAD
          # so the tag is created there. On a tag dispatch (retroactive
          # re-publish), check out the existing tag (no tagging needed).
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup semantic-release (shared toolchain — single source of truth)
        # Runs the version oracle on a push, and on a from-head `auto`
        # dispatch (release/retry HEAD letting semantic-release pick the
        # version from commits). Forced bumps use tag-head instead.
        if: ${{ github.event_name == 'push' || (inputs.from-head == 'true' && inputs.bump == 'auto') }}
        uses: hyperi-io/hyperi-ci/.github/actions/setup-semantic-release@main

      - name: Guard — predicted tag must not already exist off-HEAD
        # Defence-in-depth for issue #37: refuse to tag if the predicted
        # version already exists as a tag pointing somewhere other than
        # HEAD. A collision means semantic-release mispredicted (blind to
        # existing tags) — proceeding would rewrite release history. Fail
        # fast and loud instead. Tags are present locally (fetch-depth: 0).
        # Trivial glue: a tag-existence check + SHA compare.
        if: ${{ github.event_name == 'push' || (inputs.from-head == 'true' && inputs.bump == 'auto') }}
        run: |
          predicted="v${{ inputs.next-version }}"
          if git rev-parse -q --verify "refs/tags/${predicted}^{commit}" >/dev/null 2>&1
          then
            existing=$(git rev-parse "refs/tags/${predicted}^{commit}")
            head=$(git rev-parse "HEAD^{commit}")
            if [ "$existing" != "$head" ]
            then
              echo "::error::Predicted ${predicted} already exists at ${existing} but HEAD is ${head} — likely an orphaned tag from a past history rewrite (semantic-release is blind to tags not reachable from HEAD, so it re-predicted a taken version). Refusing to auto-tag: that would rewrite release history (issue #37). To ship past it, force an explicit version from HEAD: 'hyperi-ci publish --bump patch' (next free patch) or 'hyperi-ci publish --version X.Y.Z'. Both bypass this guard and tag HEAD directly."
              exit 1
            fi
            echo "${predicted} already exists at HEAD — nothing to tag."
          fi

      - name: Tag (semantic-release)
        # Real run (no --dry-run) — analyzes commits, writes Cargo.toml
        # + VERSION + CHANGELOG, commits with [skip ci], pushes commit,
        # creates and pushes the git tag. Same version `next-version`
        # predicted in plan (deterministic). Also handles a from-head
        # `auto` dispatch (#35): re-runs the tagger on HEAD.
        if: ${{ github.event_name == 'push' || (inputs.from-head == 'true' && inputs.bump == 'auto') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Docker Hub login
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: GHCR login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifacts
        # Build job uploads both dist/ and ci-tmp/ trees — extract at
        # the project root so paths land where consumers expect them.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: build-dist-*
          path: .
          merge-multiple: true

      - name: Install Rust toolchain
        if: inputs.language == 'rust'
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}

      - name: Tag HEAD (forced bump / explicit version)
        # from-head dispatch with a non-auto bump (issue #35): force a release
        # of HEAD. semantic-release can't force a version, so tag-head resolves
        # it — `last-tag + bump` for patch/minor, or the explicit X.Y.Z verbatim
        # (the --version override that steps past a taken/orphaned tag, #37) —
        # and creates the tag at HEAD via the GitHub API (works with
        # persist-credentials: false). It emits `version` for the Publish step,
        # which re-stamps the manifest to it before pushing to the registry.
        id: forcedtag
        if: ${{ inputs.from-head == 'true' && inputs.bump != 'auto' && inputs.bump != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ env.HYPERCI_INSTALL }} tag-head --bump ${{ inputs.bump }}

      - name: Publish
        # Uploads to all OSS destinations: crates.io / PyPI / npm /
        # GHCR / GitHub Releases / Cloudflare R2.
        env:
          # Version being released — same SSoT as Build (stamp) + Container
          # (#27). A forced from-head bump resolves its version from tag-head
          # (the plan's prediction doesn't know the forced bump); otherwise
          # the plan's next-version. publish re-stamps the manifest to this.
          HYPERCI_VERSION: ${{ steps.forcedtag.outputs.version || inputs.next-version }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: ${{ env.HYPERCI_INSTALL }} run publish
