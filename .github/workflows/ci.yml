# Project:   HyperI CI
# File:      .github/workflows/ci.yml
# Purpose:   Self-hosting CI -- hyperi-ci dogfoods its own version-first pipeline
#
# License:   BUSL-1.1 -- HYPERI PTY LIMITED
# Copyright: (c) 2026 HYPERI PTY LIMITED
#
# quality + test run the LOCAL working tree (uv run --no-sources) so a
# change to hyperi-ci's own code is exercised by that code, not by the
# published version. The publish half (plan + build + release-tail) is the
# SAME version-first pipeline consumers get, wired to the local copies of
# the predict-version action and _release-tail.yml so a workflow change is
# caught here before it reaches a consumer.
#
# Publish trigger: a push to main whose HEAD commit carries a `Publish: true`
# trailer (written by `hyperi-ci push --publish`) tags HEAD and publishes;
# every other push validates only. This replaces the old bespoke jobs that
# tagged EVERY push but only published on a manual workflow_dispatch -- the
# cause of the tag/PyPI version drift (tags ran ahead, PyPI lagged).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: false
        default: ""
        description: "Existing tag to re-publish. Omit and set from-head to release HEAD."
      from-head:
        type: string
        required: false
        default: ""
        description: "'true' to release/retry the current HEAD -- the CI creates the tag (issue #35). Mutually exclusive with `tag`."
      bump:
        type: string
        required: false
        default: "auto"
        description: "Version resolution for from-head: auto | patch | minor (forced) | X.Y.Z (exact version)."

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN default for every job (CodeQL
# actions/missing-workflow-permissions). Two jobs elevate: release-tail
# (passes write down to _release-tail.yml -- semantic-release commit/tag +
# GHCR) and plan (semantic-release push-access verify on a publish predict).
# commit-check / quality / test / build are read-only.
permissions:
  contents: read

jobs:
  plan:
    name: Plan
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    # predict-version runs semantic-release, whose git plugin verifies push
    # access (a `git push --dry-run`) on a publish predict -- needs write.
    permissions:
      contents: write
    outputs:
      run-checks: ${{ steps.predict.outputs.run-checks }}
      run-build: ${{ steps.predict.outputs.run-build }}
      will-publish: ${{ steps.predict.outputs.will-publish }}
      next-version: ${{ steps.predict.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0  # full history -- semantic-release dry-run reads it
      - name: Predict version + derive gates
        id: predict
        uses: ./.github/actions/predict-version
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          from-head: ${{ inputs.from-head }}
          bump: ${{ inputs.bump }}

  commit-check:
    name: Commit messages
    # Landing gate for conventional-commit messages -- dogfoods the same job
    # the reusable <lang>-ci.yml workflows now ship. Deliberately NOT gated on
    # plan.outputs.run-checks: it must validate what actually reaches main on
    # EVERY merge, not only publish-worthy pushes. Fatal on push to main (what
    # lands); advisory on pull_request. Runs the LOCAL branch code (uv run) so
    # this repo's own PRs exercise the change. See CLAUDE.md CI gate doctrine.
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --no-sources
      - name: Validate commit messages
        run: uv run --no-sources hyperi-ci check-commits

  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.tag || github.ref }}
          # Full history + tags: the interface gate diffs against the last
          # release tag (issue #31).
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --no-sources

      - name: Lint
        run: uv run --no-sources ruff check src/ tests/

      - name: Format check
        run: uv run --no-sources ruff format --check src/ tests/

      - name: Workflow interface compat gate (#31)
        # Fail if a reusable-workflow/composite interface regressed vs the last
        # release -- a consumer pinned to an older caller would fail at startup.
        run: uv run --no-sources python scripts/check-workflow-interfaces.py

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --no-sources

      - name: Run tests
        run: uv run --no-sources pytest tests/ -v --tb=short

  build:
    name: Build
    needs: [plan, quality, test]
    if: needs.plan.outputs.run-build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Stamp predicted version
        # Version-first: write the version we are about to tag into
        # pyproject.toml + VERSION BEFORE building, so the wheel and
        # importlib.metadata.version("hyperi-ci") carry the published value.
        # Push and from-head both release HEAD (stale tree); a plain `tag`
        # dispatch is skipped (the tag's tree is already correct).
        if: github.event_name == 'push' || inputs.from-head == 'true'
        run: |
          version="${{ needs.plan.outputs.next-version }}"
          if [[ -z "$version" ]]; then
            echo "::error::next-version output empty"
            exit 1
          fi
          echo "Stamping version: $version"
          if [[ -f pyproject.toml ]] && grep -qE '^\[project\]' pyproject.toml; then
            sed -i -E "/^\[project\]/,/^\[/ s/^version[[:space:]]*=[[:space:]]*\"[^\"]*\"/version = \"$version\"/" pyproject.toml
            echo "Stamped pyproject.toml"
          fi
          if [[ -f VERSION ]]; then
            echo "$version" > VERSION
            echo "Stamped VERSION"
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build wheel + sdist
        run: uv build

      - name: Upload build artifacts
        # Upload VERSION alongside dist/ so the artifact root is the workspace,
        # not dist/. A single `path: dist/` makes upload-artifact strip the
        # dist/ prefix (the dir becomes the common ancestor), so the tag-publish
        # job's `uv publish` (globs dist/*) finds nothing -- the cause of the
        # v2.6.12 "No files found to publish" failure. Consumers dodge this by
        # also uploading ci-tmp/; hyperi-ci has none, so VERSION pins the root.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-dist-default
          path: |
            dist/
            VERSION
          if-no-files-found: error
          retention-days: 1

  release-tail:
    name: Release tail
    needs: [plan, build]
    # Elevated + passed to _release-tail.yml: its tag-and-publish job commits +
    # tags (contents), pushes GHCR (packages) and runs the semantic-release GH
    # plugin (issues + pull-requests). Capped by the caller's grant.
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
    # Local ref (dogfood): a change to the shared release tail is exercised
    # on hyperi-ci's own CI before any consumer pins it. The tail's own
    # tag-and-publish job is gated on will-publish == 'true', so a non-publish
    # run reaches here only when build ran (run-build == will-publish).
    uses: ./.github/workflows/_release-tail.yml
    with:
      language: python
      will-publish: ${{ needs.plan.outputs.will-publish }}
      next-version: ${{ needs.plan.outputs.next-version }}
      tag: ${{ inputs.tag }}
      from-head: ${{ inputs.from-head }}
      bump: ${{ inputs.bump }}
      publish-target: oss
      python-version: "3.12"
    secrets: inherit
