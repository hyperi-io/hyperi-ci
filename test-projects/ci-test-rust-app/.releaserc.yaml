# Project:   ci-test-rust-app
# File:      .releaserc.yaml
# Purpose:   Semantic release configuration
#
# License:   Proprietary — HYPERI PTY LIMITED
# Copyright: (c) 2026 HYPERI PTY LIMITED

branches:
- main
tagFormat: v${version}
plugins:
- - '@semantic-release/commit-analyzer'
  - preset: conventionalcommits
    releaseRules:
    - type: feat
      release: minor
    - type: fix
      release: patch
    - type: perf
      release: patch
    - type: sec
      release: patch
    - type: docs
      release: false
    - type: test
      release: false
    - type: refactor
      release: false
    - type: chore
      release: false
    - type: ci
      release: false
- '@semantic-release/release-notes-generator'
- - '@semantic-release/changelog'
  - changelogFile: CHANGELOG.md
- - '@semantic-release/exec'
  - prepareCmd: >-
      python3 -c "
      import re; from pathlib import Path;
      v='${nextRelease.version}';
      Path('VERSION').write_text(v + chr(10));
      p=Path('Cargo.toml'); t=p.read_text();
      p.write_text(re.sub(r'(?m)^version\s*=\s*\"[^\"]*\"', 'version = \"' + v + '\"', t, count=1))
      "
- - '@semantic-release/git'
  - assets:
    - CHANGELOG.md
    - VERSION
    - Cargo.toml
    message: 'chore: version ${nextRelease.version} [skip ci]'
- '@semantic-release/github'
