# HyperI CI Configuration — ci-test-rust-minimal
#
# Mirrors dfe-loader complexity (jfrog publish, container, helm, aarch64 cross)
# but with zero cargo dependencies so builds complete in <5 minutes.
# Use this project to iterate on CI scripts without 30-minute feedback loops.

language: rust

# Use standard GitHub runners (not ARC) — no runner infra dependency
runners:
  default: ubuntu-latest

quality:
  enabled: true
  rust:
    features:
      - "default"

test:
  enabled: true
  coverage: false    # No coverage tooling needed for minimal binary

build:
  enabled: true
  type: app
  strategies:
    - native
  rust:
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu

publish:
  enabled: true
  binaries: both
  container:
    enabled: true
    registry: jfrog
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
  helm:
    enabled: true
    registry: jfrog
