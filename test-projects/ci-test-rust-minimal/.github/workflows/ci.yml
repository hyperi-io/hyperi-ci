# Project:   ci-test-rust-minimal
# File:      .github/workflows/ci.yml
# Purpose:   Fast CI pipeline for testing HyperI CI scripts and publish pipeline
# Language:  Rust
#
# This project exists to validate CI changes without 30-minute dfe-loader builds.
# Zero cargo dependencies → builds complete in <5 minutes.
# Mirrors dfe-loader CI complexity: jfrog publish, container, helm, aarch64 cross.
#
# IMPORTANT: Before triggering CI, always run a local build first:
#   cargo fmt --check && cargo clippy && cargo test

name: CI

on:
  push:
    branches: ["**"]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE*', '.gitignore']
  pull_request:
    paths-ignore: ['**.md', 'docs/**', 'LICENSE*', '.gitignore']
  workflow_dispatch:

jobs:
  detect:
    name: Detect Config
    runs-on: ubuntu-latest
    outputs:
      rust_features: ${{ steps.config.outputs.rust_features }}
      rust_test_tier: ${{ steps.config.outputs.rust_test_tier }}
    steps:
      - name: Generate token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.token.outputs.token }}
      - uses: ./ci/actions/setup/detect-build-config
        id: config
        with:
          scripts-path: ./ci/scripts

  quality:
    name: Quality
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.token.outputs.token }}
      - uses: ./ci/actions/jobs/quality
        with:
          language: rust
          artifactory-url: ${{ vars.ARTIFACTORY_CARGO_URL }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}
          rust-features: ${{ needs.detect.outputs.rust_features }}
      - name: Commit auto-fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        continue-on-error: true
        with:
          commit_message: 'docs: auto-fix markdown formatting [skip ci]'
          file_pattern: '**/*.md'

  test:
    name: Test
    needs: [detect, quality]
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.token.outputs.token }}
      - uses: ./ci/actions/jobs/test
        with:
          language: rust
          artifactory-url: ${{ vars.ARTIFACTORY_CARGO_URL }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}
          rust-features: ${{ needs.detect.outputs.rust_features }}
