# HyperI CI Configuration — ci-test-python-minimal
#
# Mirrors dfe-engine complexity (container, helm, publish)
# but with zero dependencies so CI completes in <2 minutes.

language: python

runners:
  default: ubuntu-latest

quality:
  enabled: true
  python:
    ruff: blocking
    pyright: warn
    bandit: blocking
    pip_audit: blocking

test:
  enabled: true
  coverage: true
  min_coverage: 80
  use_tiers: true
  tiers:
    unit:
      enabled: true
      fail_fast: true
    integration:
      enabled: false
    e2e:
      enabled: false

build:
  enabled: true
  strategies:
    - native

publish:
  enabled: true
  container:
    enabled: true
    registry: ghcr
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
  helm:
    enabled: true
