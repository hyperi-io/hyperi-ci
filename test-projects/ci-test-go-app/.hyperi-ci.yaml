# HyperI CI Configuration — ci-test-go-app
#
# Minimal Go binary for CI pipeline testing.
# Zero dependencies, builds in seconds.

language: golang

runners:
  default: ubuntu-latest

quality:
  enabled: true
  golang:
    gofmt: blocking
    govet: blocking
    golangci_lint: blocking
    gosec: blocking
    govulncheck: warn

test:
  enabled: true
  coverage: true
  min_coverage: 80
  golang:
    race: true
    args:
      - "-v"

build:
  enabled: true
  strategies:
    - native
  golang:
    targets:
      - linux/amd64
      - linux/arm64
      - darwin/amd64
      - darwin/arm64
    cgo: false

publish:
  enabled: true
  binaries: both
  container:
    enabled: true
    registry: ghcr
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
  helm:
    enabled: true
