# Project:   HyperI CI
# File:      .releaserc.yaml
# Purpose:   Semantic release configuration
#
# License:   BUSL-1.1 — HYPERI PTY LIMITED
# Copyright: (c) 2026 HYPERI PTY LIMITED

branches:
  - main

tagFormat: "v${version}"

plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: conventionalcommits
      releaseRules:
        - breaking: true
          release: major
        - type: feat
          release: minor
        - type: fix
          release: patch
        - type: perf
          release: patch
        - type: sec
          release: patch
        - type: hotfix
          release: patch
        - type: security
          release: patch
        - type: docs
          release: false
        - type: test
          release: false
        - type: refactor
          release: false
        - type: style
          release: false
        - type: build
          release: false
        - type: ci
          release: false
        - type: chore
          release: false
        - type: deps
          release: false
        - type: revert
          release: false
        - type: wip
          release: false
        - type: cleanup
          release: false
        - type: data
          release: false
        - type: debt
          release: false
        - type: design
          release: false
        - type: infra
          release: false
        - type: meta
          release: false
        - type: ops
          release: false
        - type: review
          release: false
        - type: spike
          release: false
        - type: ui
          release: false

  - "@semantic-release/release-notes-generator"

  - - "@semantic-release/changelog"
    - changelogFile: CHANGELOG.md

  - - "@semantic-release/exec"
    - prepareCmd: "python3 -c \"from pathlib import Path; Path('VERSION').write_text('${nextRelease.version}\\n')\""

  # Create the GitHub Release for the tag (with release-notes-generator notes).
  # Without this, semantic-release only tags — the GH releases lagged the tags
  # (stuck at v1.4.2). Comments/fail-issues disabled — just the release.
  - - "@semantic-release/github"
    - successComment: false
      failComment: false
      failTitle: false

  # @semantic-release/git DROPPED (2026-05): it committed "chore: version X"
  # back to main and tagged that commit; later force-pushes orphan it → tag
  # unreachable → next release recomputes the same version → "tag vX already
  # exists". semantic-release now tags HEAD (always reachable). VERSION/CHANGELOG
  # no longer committed back — GH release has the notes, container reads
  # HYPERCI_VERSION.
