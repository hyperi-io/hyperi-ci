#
# This file is the SINGLE SOURCE OF TRUTH for organisation-specific settings.
# All values can be overridden by environment variables of the same name
# (uppercased, with dots replaced by underscores).

github:
  org: hyperi-io
  base_url: https://github.com/hyperi-io
  ci_repo_url: https://github.com/hyperi-io/hyperi-ci.git
  ai_repo_url: https://github.com/hyperi-io/ai.git

jfrog:
  domain: hypersec.jfrog.io
  org_prefix: hyperi
  # Reduced to private staging only (PyPI + Cargo).
  # All other artifact types use GitHub. See docs/JFROG-MIGRATION.md.
  repos:
    pypi: hyperi-pypi
    pypi_local: hyperi-pypi-local
    cargo_virtual: hyperi-cargo-virtual
    cargo_local: hyperi-cargo-local

ghcr:
  registry: ghcr.io
  org: hyperi-io
  charts_url: oci://ghcr.io/hyperi-io/charts

dockerhub:
  # Authenticated pulls only — bypasses Docker Hub rate limits.
  # NOT a publish target. We publish containers to GHCR.
  registry: docker.io

# Deprecated URL patterns for auto-migration from old repo names
deprecated_ci_urls:
  - "*/hypersec-io/ci.git"
  - "*/hypersec-io/ci"
  - "*/hyperi-io/hyperci.git"
  - "*/hyperi-io/hyperci"
  - "*/hyperi-io/hs-ci.git"
  - "*/hyperi-io/hs-ci"
