#
# SSOT for every versioned dependency in the CI workflows AND composite
# actions. The pre-commit hook (scripts/update-versions.py --fix) keeps the
# pipeline pinned to these exact SHAs.
#
# Actions pin to a commit SHA with a `# <version>` comment — a tag can be
# force-moved, a SHA can't (supply-chain hardening). Policy + the Renovate
# split: docs/dependencies/deps-pinning.md.
#
# Update script: uv run scripts/update-versions.py
#   --check         current vs SSOT (dry run, default)
#   --apply         rewrite workflows + composites to match this file
#   --fix           --apply + non-zero exit on change (pre-commit hook)
#   --latest        report newest release >= 7 days old per action
#   --auto-update   bump to those, test on ci-test-* projects, commit/revert

# GitHub Actions — SHA-pinned, 7-day cooldown (see _select_pinned_release)
actions:
  checkout:
    version: v6.0.3
    sha: df4cb1c069e1874edd31b4311f1884172cec0e10
  setup-node:
    version: v6.4.0
    sha: 48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
  setup-go:
    version: v6.5.0
    sha: 924ae3a1cded613372ab5595356fb5720e22ba16
  setup-uv:
    version: v8.2.0
    sha: fac544c07dec837d0ccb6301d7b5580bf5edae39
  cache:
    version: v5.1.0
    sha: caa296126883cff596d87d8935842f9db880ef25
  # Branch ref (dtolnay/rust-toolchain has no semver releases): pinned to
  # the newest master commit >= 7 days old. The toolchain itself is chosen
  # by the `with: toolchain:` input, not by the ref.
  rust-toolchain:
    version: master
    sha: fa04a1451ff1842e2626ccb99004d0195b455a88
  upload-artifact:
    version: v7.0.1
    sha: 043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
  download-artifact:
    version: v8.0.1
    sha: 3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
  docker-login:
    version: v4.4.0
    sha: af1e73f918a031802d376d3c8bbc3fe56130a9b0
  docker-setup-buildx:
    version: v4.2.0
    sha: bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
  # Prunes branch-mode dev images (_ghcr-prune.yml). Chosen over
  # snok/container-retention-policy: dataaxiom handles multi-arch
  # packages + attestation referrers safely (snok's README warns
  # against multi-platform use); verified maintained 2026-07.
  ghcr-cleanup:
    version: v1.0.16
    sha: cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4

# External CLI tools hyperi-ci installs at CI time.
#
# Same 7-day cooldown as actions above, and the same "a breaking bump is a
# human edit" rule - but the clamp follows semver's COMPATIBILITY axis, which
# is not always the major (see _compat_clamp):
#   1.x+  clamp the major   - gitleaks v8 -> v9 never auto-lands. That is
#         precisely the breaking-CLI case that produced #64 (`detect` removed).
#   0.x   clamp major AND minor - under semver §4, 0.20 -> 0.21 is itself a
#         breaking bump. cargo-deny (0.20.2) and cargo-audit (v0.22.2) are 0.x,
#         so clamping only the major there would wave through the breaking axis
#         while blocking the safe 1.0.0 move.
#
# `pin:` names the file that MIRRORS this version, because these tools are
# consumed from Python / composite-action source rather than a `uses:` line.
# config/ ships OUTSIDE the wheel (pyproject: packages = ["src/hyperi_ci"]), so
# runtime code cannot read this file - the value is COPIED into the source, and
# `update-versions.py --fix` (pre-commit) fails if the copy drifts. Mark the
# mirrored line with `# hyperi-ci:pin tools.<name>` so the rewrite is anchored
# to an explicit marker rather than a guessed regex.
#
# KNOWN GAP - these are pinned by TAG, which does not yet satisfy the "SHA over
# tag" hard rule in docs/dependencies/deps-pinning.md. A git tag cannot be
# force-moved into our download path (we fetch a release ASSET, not a ref), but
# an asset CAN be deleted and re-uploaded under the same tag, and no install
# path here verifies a digest today. Tracked in #66; the fix is a `sha256:` per
# asset pinned here and verified at download.
tools:
  gitleaks:
    version: v8.30.1
    repo: gitleaks/gitleaks
    pin: src/hyperi_ci/quality/gitleaks.py
  hadolint:
    version: v2.14.0
    repo: hadolint/hadolint
    pin: src/hyperi_ci/quality/hadolint.py
  kubeconform:
    version: v0.8.0
    repo: yannh/kubeconform
    pin: src/hyperi_ci/quality/kubeconform.py
  kube-linter:
    version: v0.8.3
    repo: stackrox/kube-linter
    pin: src/hyperi_ci/quality/kube_linter.py
  osv-scanner:
    version: v2.4.0
    repo: google/osv-scanner
    pin: .github/actions/setup-osv-scanner/action.yml
  golangci-lint:
    version: v2.12.2
    repo: golangci/golangci-lint
    pin: .github/actions/setup-go-tools/action.yml
  # NOT v2.28.0: published 2026-07-14, still inside the 7-day cooldown. The
  # cooldown applies to our own pins too, not just to what --auto-update picks.
  gosec:
    version: v2.27.1
    repo: securego/gosec
    pin: .github/actions/setup-go-tools/action.yml
  # No prebuilt binaries upstream (golang/vuln releases carry no assets), so
  # this one is still `go install` - but pinned, not @latest. Small pure-Go
  # module, so the compile costs seconds.
  govulncheck:
    version: v1.1.4
    repo: golang/vuln
    pin: .github/actions/setup-go-tools/action.yml
  # rustsec is a MONOREPO: every crate tags as `<crate>/vX.Y.Z`, so without
  # tag_prefix the release scan sees `platforms/v4.0.0` et al and either picks
  # the wrong crate or (because the tag is not bare semver) silently finds
  # nothing at all.
  cargo-audit:
    version: v0.22.2
    repo: rustsec/rustsec
    tag_prefix: cargo-audit/
    pin: .github/actions/setup-rust-tools/action.yml
  # Upstream tags have NO leading `v` - keep it that way, the download URL is
  # built from this string verbatim.
  cargo-deny:
    version: 0.20.2
    repo: EmbarkStudios/cargo-deny
    pin: .github/actions/setup-rust-tools/action.yml
  # Used inside the generated cargo-chef Dockerfile (container/compose.py), not
  # a workflow - the pin marker works the same in Python source.
  cargo-chef:
    version: v0.1.77
    repo: LukeMathWalker/cargo-chef
    pin: src/hyperi_ci/container/compose.py

# Upstream capabilities we WANT but that are not ready yet.
#
# `--latest` prints these on every run, so the decision resurfaces at each
# dependency update instead of living in someone's memory. Each entry names the
# gate that would let it land - something checkable, not a vibe.
watch:
  uv-audit:
    what: replace pip-audit with `uv audit` (astral stack consolidation)
    blocked_by: >-
      experimental as of uv 0.11.29 (latest, 2026-07-15) - the command warns
      "may change without warning" and is gated behind
      `--preview-features audit-command`. pip-audit is a BLOCKING gate in 14
      repos; it does not ride on a preview command.
    gate: "`uv audit` runs with no experimental warning and no --preview-features"
    issue: 68

# Language runtimes (default versions in workflow inputs)
runtimes:
  python: "3.12"
  node: "22"
  rust: stable

# npm packages (semantic-release toolchain)
semantic_release:
  core: "25"
  plugins:
    - "@semantic-release/commit-analyzer"
    - "@semantic-release/release-notes-generator"
    - "@semantic-release/changelog"
    - "@semantic-release/exec"
    - "@semantic-release/git"
    - "@semantic-release/github"
    - "conventional-changelog-conventionalcommits"
