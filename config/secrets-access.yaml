# Project:   HyperI CI
# File:      config/secrets-access.yaml
# Purpose:   Group-based org secret visibility management
#
# License:   Proprietary — HYPERI PTY LIMITED
# Copyright: (c) 2026 HYPERI PTY LIMITED
#
# Defines which org secrets are available to which repos, using groups.
# Sync: uv run scripts/sync-secrets-access.py [--check | --apply]
#
# Visibility modes:
#   selected  — only repos listed in the assigned groups (preferred)
#   private   — all private repos (use sparingly)
#   all       — all repos including public (avoid for credentials)
#
# When changing a secret from 'all' or 'private' to 'selected',
# you must first change visibility in the GitHub UI (requires
# re-entering the secret value). After that, this script manages
# the repo list automatically.

# Repo groups — reusable sets of repos
groups:
  # Active product repos that build and publish
  dfe-core:
    - dfe-core
    - dfe-engine
    - dfe-receiver
    - dfe-loader
    - dfe-fetcher
    - dfe-archiver
    - dfe-schemas
    - dfe-cli
    - dfe-cli-core
    - dfe-ui

  # Repos that publish containers to GHCR
  container-publishers:
    - dfe-core
    - dfe-engine
    - dfe-receiver
    - dfe-loader
    - dfe-fetcher
    - dfe-archiver
    - dfe-docker
    - ci-images

  # Repos that publish private packages to JFrog staging (pre-GA)
  jfrog-staging:
    - dfe-engine
    - dfe-core

  # Repos that publish Python packages
  python-publishers:
    - hyperi-ci
    - hyperi-pylib
    - dfe-core
    - dfe-schemas
    - dfe-cli
    - dfe-cli-core

  # Repos that publish Rust crates
  rust-publishers:
    - hyperi-rustlib
    - dfe-engine
    - dfe-receiver
    - dfe-loader
    - dfe-fetcher
    - dfe-archiver
    - queue-file
    - logreducer

  # Repos that publish npm packages
  npm-publishers:
    - dfe-ui
    - hyperi-website

  # Repos that need cross-repo workflow dispatch
  ci-dispatch:
    - dfe-core
    - hyperi-ci
    - ci-test-rust-app
    - ci-test-rust-lib
    - ci-test-rust-workspace
    - ci-test-python-app
    - ci-test-python-lib
    - ci-test-ts-app
    - ci-test-go-app

  # CI test projects (minimal access)
  ci-test:
    - ci-test-rust-app
    - ci-test-rust-lib
    - ci-test-rust-workspace
    - ci-test-python-app
    - ci-test-python-lib
    - ci-test-ts-app
    - ci-test-go-app

  # Data infrastructure
  data-infra:
    - dfe-core
    - dfe-engine
    - dfe-data-resources
    - spike-dfe-ch-prep

  # AI/ML tooling
  ai-tooling:
    - hyperi-ai
    - ai-code
    - claude-usage-monitor
    - claudemeter

  # Infrastructure repos
  infra:
    - hyperi-infra
    - dfe-devex
    - dfe-developer
    - proxmox

  # All repos that use hyperi-ci (need Docker Hub auth for CI pulls)
  ci-consumers:
    - dfe-core
    - dfe-engine
    - dfe-receiver
    - dfe-loader
    - dfe-fetcher
    - dfe-archiver
    - dfe-schemas
    - dfe-cli
    - dfe-cli-core
    - dfe-ui
    - hyperi-pylib
    - hyperi-rustlib
    - hyperi-ci
    - ci-test-rust-app
    - ci-test-rust-lib
    - ci-test-rust-workspace
    - ci-test-python-app
    - ci-test-python-lib
    - ci-test-ts-app
    - ci-test-go-app

# Secret assignments — maps secret name to visibility + groups
secrets:
  # --- Publishing credentials ---
  JFROG_TOKEN:
    visibility: selected
    groups: [jfrog-staging]

  JFROG_USERNAME:
    visibility: selected
    groups: [jfrog-staging]

  PYPI_TOKEN:
    visibility: selected
    groups: [python-publishers]

  NPM_TOKEN:
    visibility: selected
    groups: [npm-publishers]

  CRATES_TOKEN:
    visibility: selected
    groups: [rust-publishers]

  # --- Container registry (GHCR via GitHub App) ---
  # CONTAINER_MGT_APP_ID is an org variable (visibility: all)
  # CONTAINER_MGT_CLIENT_ID is an org variable (visibility: all)
  CONTAINER_MGT_APP_PRIVATE_KEY:
    visibility: all

  # --- Docker Hub (authenticated pulls for rate limit bypass) ---
  DOCKERHUB_USERNAME:
    visibility: selected
    groups: [ci-consumers]

  DOCKERHUB_TOKEN:
    visibility: selected
    groups: [ci-consumers]

  DOCKERHUB_PASSWORD:
    visibility: selected
    groups: [container-publishers]

  # --- GitHub access ---
  GIT_TOKEN:
    visibility: selected
    groups: [ci-dispatch, dfe-core]

  GIT_TOKEN_WORKFLOW_ACCESS:
    visibility: selected
    groups: [ci-dispatch]

  GH_RELEASE_TOKEN:
    visibility: selected
    groups: [ci-dispatch]

  GH_APP_ID:
    visibility: selected
    groups: [dfe-core, ai-tooling]

  GH_APP_PRIVATE_KEY:
    visibility: selected
    groups: [dfe-core, ai-tooling]

  GITLEAKS_GH_ACTIONS_KEY:
    visibility: selected
    groups: [ci-consumers]

  # --- Data infrastructure ---
  CLICKHOUSE_ORG_ID:
    visibility: selected
    groups: [data-infra]

  CLICKHOUSE_ORG_ID_CLOUD:
    visibility: selected
    groups: [data-infra]

  CLICKHOUSE_TOKEN_KEY:
    visibility: selected
    groups: [data-infra]

  CLICKHOUSE_TOKEN_KEY_CLOUD:
    visibility: selected
    groups: [data-infra]

  CLICKHOUSE_TOKEN_SECRET:
    visibility: selected
    groups: [data-infra]

  CLICKHOUSE_TOKEN_SECRET_CLOUD:
    visibility: selected
    groups: [data-infra]

  # --- Cloud / infra ---
  AWS_DEFAULT_REGION:
    visibility: selected
    groups: [infra, dfe-core]

  AWS_PROFILE:
    visibility: selected
    groups: [infra, dfe-core]

  R2_ACCESS_KEY_ID:
    visibility: selected
    groups: [infra]

  R2_SECRET_ACCESS_KEY:
    visibility: selected
    groups: [infra]

  R2_API_TOKEN:
    visibility: selected
    groups: [infra]

  TF_TOKEN_HYPERSEC_JFROG_IO:
    visibility: selected
    groups: [infra]

  # --- AI keys ---
  ANTHROPIC_API_KEY:
    visibility: selected
    groups: [ai-tooling]

  OPENAI_API_KEY:
    visibility: selected
    groups: [ai-tooling]

  GOOGLE_API_KEY:
    visibility: selected
    groups: [ai-tooling]

  # --- Build tooling ---
  NUITKA_SSH_KEY:
    visibility: selected
    groups: [python-publishers]

  LINEAR_API_KEY:
    visibility: selected
    groups: [dfe-core]

  # --- Legacy (DELETE these from GitHub) ---
  # JFROG_ACCESS_TOKEN: DELETE (redundant with JFROG_TOKEN)
  # ARTIFACTORY_CI_TOKEN: DELETE
  # ARTIFACTORY_CI_USERNAME: DELETE
  # ARTIFACTORY_PASSWORD: DELETE
  # ARTIFACTORY_TENANT_PASSWORD: DELETE
  # ARTIFACTORY_TENANT_REGISTRY: DELETE
  # ARTIFACTORY_TENANT_USERNAME: DELETE
  # ARTIFACTORY_USERNAME: DELETE
  # HS_CI_PAT: DELETE
